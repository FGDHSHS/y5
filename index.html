<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>صفحة اختبار الموقع الرسمية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
            color: #333;
        }
        .test-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 {
            font-size: 1.4rem;
            color: #007bff;
            margin-bottom: 15px;
        }
        p {
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .action-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            font-weight: bold;
        }
        .action-btn:hover {
            background-color: #0056b3;
        }
        #status-result {
            margin-top: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            line-height: 1.6;
        }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        .info { color: #17a2b8; }
    </style>
</head>
<body>

    <div class="test-container">
        <h1>اختبار إذن الموقع الجغرافي</h1>
        <p>هذه صفحة تجريبية قياسية. اضغط على الزر بالأسفل لتفعيل طلب إذن الموقع من المتصفح بشكل رسمي.</p>
        
        <button class="action-btn" onclick="triggerLocationRequest()">تفعيل الموقع الجغرافي</button>
        
        <div id="status-result"></div>
    </div>

    <script>
        function triggerLocationRequest() {
            const resultArea = document.getElementById('status-result');
            resultArea.innerHTML = "جاري استدعاء نافذة المتصفح...";
            resultArea.className = "info";

            // التحقق من دعم المتصفح للميزة
            if (!navigator.geolocation) {
                resultArea.innerHTML = "للأسف، متصفحك الحالي لا يدعم ميزة تحديد الموقع.";
                resultArea.className = "error";
                return;
            }

            // طلب الموقع بالطريقة الرسمية والمعتمدة
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    // نجاح العملية (المستخدم وافق)
                    const lat = position.coords.latitude.toFixed(6);
                    const lon = position.coords.longitude.toFixed(6);
                    resultArea.innerHTML = `✅ تم السماح بنجاح!<br>خط العرض: ${lat}<br>خط الطول: ${lon}`;
                    resultArea.className = "success";
                },
                (error) => {
                    // فشل العملية (رفض أو حظر مسبق)
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            resultArea.innerHTML = "❌ تم رفض الإذن. إذا كانت الرسالة السوداء لا تزال تظهر تلقائياً، يرجى الضغط على أيقونة القفل بجانب رابط الموقع بالأعلى وإلغاء الحظر يدوياً لمرة واحدة كخطوة أخيرة.";
                            resultArea.className = "error";
                            break;
                        case error.POSITION_UNAVAILABLE:
                            resultArea.innerHTML = "❌ معلومات الموقع غير متوفرة في جهازك حالياً.";
                            resultArea.className = "error";
                            break;
                        case error.TIMEOUT:
                            resultArea.innerHTML = "❌ انتهت مهلة الاستجابة لطلب الموقع.";
                            resultArea.className = "error";
                            break;
                    }
                },
                {
                    enableHighAccuracy: true, // طلب دقة عالية
                    timeout: 8000,            // مهلة 8 ثوانٍ
                    maximumAge: 0             // عدم استخدام موقع قديم مخزن مؤقتاً
                }
            );
        }
    </script>

</body>
</html>
